<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Green Mouse">
<title>Green Mouse — Studio</title>
<style>
:root{
  --bg:#0d1318;--bg2:#111a20;--panel:#16222b;--p2:#1c2d39;--line:#253545;--l2:#345060;
  --ink:#edf3ef;--mut:#8ba0ab;--mut2:#607a87;
  --G:#32b52f;--Gd:#228a20;--Gs:#0c2410;
  --blue:#5aaeff;--pur:#b27eef;--red:#ff5050;--amb:#ffb030;--mint:#60dfaa;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
  min-height:100dvh;padding-bottom:max(env(safe-area-inset-bottom),16px)}
button,input,textarea,select,label{font:inherit;color:inherit}
button{cursor:pointer;border:0;background:0;padding:0}

/* ─── header ─── */
.hd{position:sticky;top:0;z-index:40;background:rgba(10,16,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
.hd-row{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 14px}
.logo{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(50,181,47,.5))}
.brand b{display:block;font-size:19px;font-weight:900;letter-spacing:.04em;text-transform:uppercase}
.brand small{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--G)}
.hd-acts{margin-left:auto;display:flex;gap:6px}
.ico-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--l2);background:var(--panel);display:grid;place-items:center;font-size:16px}
.tabs{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 14px 10px}
.tab{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:8px 4px;font-weight:800;font-size:12.5px;letter-spacing:.03em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--mut);transition:.15s}
.tab .ti{font-size:17px}
.tab.on{background:linear-gradient(170deg,var(--G),var(--Gd));color:#071408;border-color:transparent;box-shadow:0 6px 20px rgba(50,181,47,.3)}
.app{max-width:900px;margin:0 auto;padding:14px 14px 32px}
.view{display:none}.view.on{display:block}

/* ─── shared ─── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 36px rgba(0,0,0,.35);overflow:hidden}
.card-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.card-hd h2{margin:0;font-size:12.5px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--mut)}
.card-body{padding:14px}
.fl{display:block;font-size:11.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:12px 0 5px}
.fl:first-child{margin-top:0}
input[type=text],input[type=number],input[type=date],textarea,select{width:100%;background:var(--bg2);border:1px solid var(--l2);border-radius:10px;padding:11px 12px;font-size:16px;color:var(--ink)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--G);box-shadow:0 0 0 3px rgba(50,181,47,.18)}
textarea{min-height:52px;resize:vertical;line-height:1.4}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:12px;padding:11px 16px;font-weight:800;font-size:14px;border:1px solid var(--l2);background:var(--p2);cursor:pointer;transition:.1s}
.btn:active{transform:translateY(1px)}
.btn.g{background:linear-gradient(170deg,var(--G),var(--Gd));color:#071408;border-color:transparent}
.btn.ghost{background:0;border-color:var(--l2)}.btn.red{color:var(--red);border-color:#4a1a1a;background:#1e0d0d}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.hint{font-size:12px;color:var(--mut2);margin-top:5px}
.empty{text-align:center;color:var(--mut2);padding:28px 12px;font-weight:700;font-size:14px}

/* ─── energy ─── */
.en-btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.en-btn{flex:1;min-width:0;padding:7px 3px;border-radius:9px;font-size:11.5px;font-weight:800;border:1.5px solid var(--line);background:var(--bg2);color:var(--mut);cursor:pointer}
.en-btn.on-1{background:#0a1f36;color:#5ab0ff;border-color:#1a4a70}
.en-btn.on-2{background:#0a2318;color:#50c878;border-color:#155a28}
.en-btn.on-3{background:#251e08;color:#d4b830;border-color:#5a480a}
.en-btn.on-4{background:#2a1208;color:#ff8c30;border-color:#6a3010}
.en-btn.on-5{background:#270808;color:#ff4040;border-color:#6a1010}
.se-btns{display:flex;gap:6px}
.se-btn{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:800;border:1.5px solid var(--line);background:var(--bg2);color:var(--mut);cursor:pointer}
.se-btn.on-calm{background:#0a1f36;color:#5ab0ff;border-color:#1a4a70}
.se-btn.on-intense{background:#270808;color:#ff4040;border-color:#6a1010}
.en-bar{display:flex;height:20px;border-radius:6px;overflow:hidden;margin:6px 0}

/* ─── set ─── */
.set-bar{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.set-select{flex:1;background:var(--panel);border:1px solid var(--l2);border-radius:12px;padding:10px 12px;font-size:15px;font-weight:800}
.set-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:center}
.stat-box .sv{font-size:21px;font-weight:900;color:var(--G)}
.stat-box .sl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-top:2px}
.si{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:7px;overflow:hidden}
.si.expanded{border-color:var(--Gd)}
.si-row{display:grid;grid-template-columns:40px 1fr auto;align-items:center;cursor:pointer;padding:11px 10px 11px 0}
.si-num{width:40px;text-align:center;font-size:19px;font-weight:900;color:var(--G)}
.si-info{min-width:0}
.si-title{font-size:15px;font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-meta{font-size:11.5px;color:var(--mut);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.si-acts{display:flex;gap:4px;padding-right:8px;align-items:center}
.si-acts button{width:30px;height:30px;border-radius:8px;border:1px solid var(--l2);background:var(--p2);font-size:13px}
.si-cumul{font-size:11px;font-weight:800;color:var(--mut2);white-space:nowrap}
.si-cues{display:none;padding:4px 12px 13px;border-top:1px solid var(--line)}
.si.expanded .si-cues{display:block}
.cue-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
@media(min-width:600px){.cue-grid{grid-template-columns:1fr 1fr 1fr}}
.cue-field textarea{min-height:42px;font-size:14px;padding:7px 10px}
.cue-field .fl{color:var(--mut)}
.rappel-tog{display:flex;align-items:center;gap:8px;padding:10px 0 0;cursor:pointer;font-size:13.5px;font-weight:800}
.rappel-tog input{width:20px;height:20px;accent-color:var(--amb)}
.expand-ico{transition:transform .2s;font-size:12px;color:var(--mut);padding:0 4px}
.si.expanded .expand-ico{transform:rotate(180deg)}

/* ─── biblio ─── */
.sl-item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.sl-item:last-child{border-bottom:0}
.sl-title{font-size:14.5px;font-weight:900;text-transform:uppercase}
.sl-meta{font-size:11.5px;color:var(--mut);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.add-btn{padding:7px 11px;font-size:13px;background:var(--Gs);color:var(--G);border:1px solid var(--Gd);border-radius:9px;font-weight:800;white-space:nowrap}

/* ─── journal ─── */
.jtype-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.jtype-btn{padding:14px;border-radius:14px;border:2px solid var(--l2);background:var(--panel);font-weight:900;font-size:14px;cursor:pointer;transition:.15s}
.jtype-btn:active{border-color:var(--G);background:var(--Gs)}
.je{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:7px;padding:13px;display:grid;grid-template-columns:auto 1fr;gap:11px}
.je-badge{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:19px;flex:0 0 auto}
.je-badge.rep{background:#0a1e2e;border:1px solid #1a4060}
.je-badge.con{background:#1a0d26;border:1px solid #3d1a60}
.song-pill{font-size:11.5px;font-weight:800;padding:3px 8px;border-radius:999px;background:var(--p2);border:1px solid var(--l2)}
.song-pill.g{background:var(--Gs);border-color:var(--Gd);color:var(--G)}
.song-pill.y{background:#1a1500;border-color:#605010;color:var(--amb)}
.song-pill.r{background:#200808;border-color:#601010;color:var(--red)}
.rating-btns{display:flex;gap:6px;margin-top:7px}
.rb{padding:8px 14px;border-radius:10px;font-weight:800;font-size:13px;border:1.5px solid;cursor:pointer;transition:.1s}
.rb.g{border-color:var(--Gd);color:var(--G);background:0}.rb.y{border-color:#605010;color:var(--amb);background:0}.rb.r{border-color:#4a1010;color:var(--red);background:0}
.rb.on.g{background:var(--Gs)}.rb.on.y{background:#1a1200}.rb.on.r{background:#1e0606}
.song-check{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.song-check:last-child{border-bottom:0}
.song-check label{flex:1;font-size:13.5px;font-weight:800;cursor:pointer}
.song-check input[type=checkbox]{width:19px;height:19px;accent-color:var(--G)}
.sc-rating button{width:27px;height:27px;border-radius:7px;font-size:12px;border:1px solid var(--l2);background:var(--p2)}
.sc-rating button.on{outline:2px solid}

/* ─── analyse ─── */
.atabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.atabs::-webkit-scrollbar{display:none}
.atab{border:1px solid var(--l2);background:var(--panel);border-radius:10px;padding:7px 13px;font-size:12.5px;font-weight:800;color:var(--mut);white-space:nowrap;flex:0 0 auto}
.atab.on{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
.asec{display:none}.asec.on{display:block}
.chrono-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.chrono-tbl th{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:6px 5px;text-align:left;border-bottom:2px solid var(--line)}
.chrono-tbl td{padding:7px 5px;border-bottom:1px solid var(--line);vertical-align:middle}
.chrono-tbl td:first-child{font-weight:900;color:var(--G);text-align:center}
.tune-ch{font-size:10px;font-weight:800;background:rgba(255,176,48,.14);color:var(--amb);border-radius:5px;padding:2px 5px}
.health-tbl{width:100%;border-collapse:collapse}
.health-tbl th{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:6px 7px;text-align:left;border-bottom:2px solid var(--line)}
.health-tbl td{font-size:12.5px;padding:7px 7px;border-bottom:1px solid var(--line)}
.health-tbl td:first-child{font-weight:900;text-transform:uppercase}
.sdot{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:11.5px;padding:3px 8px;border-radius:999px}
.sd-g{background:var(--Gs);color:var(--G);border:1px solid var(--Gd)}
.sd-y{background:#1a1200;color:var(--amb);border:1px solid #5a3d00}
.sd-r{background:#180707;color:var(--red);border:1px solid #4a1010}
.sd-x{background:var(--p2);color:var(--mut2);border:1px solid var(--line)}
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:0}
.kl{display:flex;align-items:baseline;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.kl:last-child{border-bottom:0}
.kl-num{font-size:18px;font-weight:900;color:var(--G);width:28px;text-align:center;flex:0 0 auto}
.kl-title{font-size:11.5px;font-weight:900;text-transform:uppercase;color:var(--mut)}
.kl-content{font-size:13px;margin-top:2px;line-height:1.4}
.energy-flag{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.energy-flag:last-child{border-bottom:0}
.ef-ic{font-size:18px;flex:0 0 auto;margin-top:1px}
.ef-title{font-weight:800;font-size:13px;margin-bottom:2px}
.ef-detail{color:var(--mut);font-size:12px}

/* ─── SCÈNE ─── */
.scene-ov{position:fixed;inset:0;z-index:70;
  background:radial-gradient(ellipse at 70% -5%,rgba(50,181,47,.18),transparent 55%),var(--bg);
  display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:max(env(safe-area-inset-bottom),12px);overflow:hidden}
.scene-ov[hidden]{display:none}
.sc-hd{display:flex;align-items:center;gap:8px;padding:10px 14px 4px;flex-wrap:wrap;flex:0 0 auto;max-width:640px;margin:0 auto;width:100%}
.sc-counter{font-weight:900;font-size:14px}
.sc-counter b{color:var(--G);font-size:17px}
.sc-scale{display:flex;align-items:center;gap:4px}
.sc-scale button{width:32px;height:32px;border-radius:8px;border:1px solid var(--l2);background:var(--panel);font-weight:900;font-size:14px;color:var(--mut)}
.sc-scale span{font-size:12px;font-weight:800;color:var(--mut2);width:28px;text-align:center}
.wake-btn{border:1px solid var(--l2);background:var(--panel);color:var(--mut);border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.wake-btn.on{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
.sc-close{border:1px solid var(--l2);background:var(--panel);border-radius:10px;width:34px;height:34px;display:grid;place-items:center;font-size:15px;margin-left:auto}
/* chrono strip */
.sc-chrono{display:flex;align-items:center;gap:8px;padding:4px 14px 2px;flex:0 0 auto;max-width:640px;margin:0 auto;width:100%;flex-wrap:wrap}
.sc-chrono-time{font-size:13px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:.04em}
.sc-chrono-time span{color:var(--G)}
.sc-chrono-sep{color:var(--mut2);font-size:12px}
.chrono-btn{border:1px solid var(--l2);background:var(--panel);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:800;color:var(--mut)}
.chrono-btn.run{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
.chrono-save{border:1px solid #1a4060;background:#0a1e2e;border-radius:8px;padding:5px 10px;font-size:13px;font-weight:800;color:var(--blue)}
/* progress */
.sc-prog{padding:4px 14px;flex:0 0 auto;max-width:640px;margin:0 auto;width:100%}
.sc-prog-bar{height:5px;border-radius:3px;background:var(--p2)}
.sc-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--Gd),var(--G));transition:width .25s}
/* view switcher */
.sc-vsw{display:flex;gap:5px;padding:4px 14px;flex:0 0 auto;max-width:640px;margin:0 auto;width:100%}
.svb{flex:1;border:1px solid var(--l2);background:var(--panel);border-radius:10px;padding:8px 4px;font-size:12.5px;font-weight:800;color:var(--mut)}
.svb.on{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
/* scrollable content zone */
.sc-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:640px;margin:0 auto;width:100%;padding:4px 14px 0}
/* card */
.sc-card{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.45);padding:18px 16px;position:relative;overflow:hidden;--s:1}
.sc-card::before{content:"";position:absolute;inset:0;background:radial-gradient(420px 200px at 100% 0,rgba(50,181,47,.1),transparent);pointer-events:none}
.sc-tap-l,.sc-tap-r{position:absolute;inset:0;z-index:5;background:0}
.sc-tap-l{right:65%}.sc-tap-r{left:35%}
.sc-edge-l,.sc-edge-r{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;opacity:.12;pointer-events:none}
.sc-edge-l{left:10px}.sc-edge-r{right:10px}
.sc-num{font-size:calc(50px*var(--s));font-weight:900;line-height:.85;color:var(--G);text-shadow:0 6px 24px rgba(50,181,47,.32);letter-spacing:-2px;flex:0 0 auto;position:relative}
.sc-num-bar{position:absolute;bottom:-3px;left:0;right:0;height:4px;border-radius:2px}
.sc-title{font-size:calc(27px*var(--s));font-weight:900;line-height:1.02;text-transform:uppercase;letter-spacing:-.5px;word-break:break-word;padding-top:3px}
.sc-meta-row{display:flex;gap:10px;flex-wrap:wrap;font-size:calc(12.5px*var(--s));font-weight:800;color:var(--mut);margin-top:5px}
.sc-meta-row b{color:var(--ink)}
.sc-cue{display:grid;grid-template-columns:40px 1fr;gap:9px;align-items:start;background:var(--p2);border:1px solid var(--line);border-radius:12px;padding:10px 10px;border-left:3.5px solid var(--cc,var(--line))}
.sc-chip{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:calc(19px*var(--s));background:color-mix(in srgb,var(--cc) 13%,transparent);border:1px solid color-mix(in srgb,var(--cc) 30%,transparent)}
.sc-clbl{font-size:calc(10px*var(--s));font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--cc)}
.sc-ctxt{font-size:calc(15.5px*var(--s));font-weight:700;line-height:1.28;margin-top:2px}
.sc-ctxt div+div{margin-top:3px}
.cc-dep{--cc:var(--blue)}.cc-pub{--cc:var(--G)}.cc-tech{--cc:var(--pur)}.cc-vig{--cc:var(--red)}.cc-enc{--cc:var(--amb)}.cc-par{--cc:var(--mint)}
/* lyrics view */
.sc-lyrics{font-size:calc(15px*var(--s));line-height:1.7;white-space:pre-wrap;color:var(--ink);padding:4px 0}
.sc-lyrics-ctrl{display:flex;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap}
.sc-lyrics-ctrl button{border:1px solid var(--l2);background:var(--panel);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:800;color:var(--mut)}
.sc-lyrics-ctrl button.on{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
.sc-spd{font-size:12px;font-weight:800;color:var(--mut2);width:28px;text-align:center}
/* musicians view */
.mus-tabs{display:flex;gap:5px;margin-bottom:10px}
.mus-tab{flex:1;border:1px solid var(--l2);background:var(--panel);border-radius:9px;padding:7px 4px;font-size:12.5px;font-weight:800;color:var(--mut);text-align:center}
.mus-tab.on{background:var(--Gs);color:var(--G);border-color:var(--Gd)}
.mus-content{font-size:calc(14px*var(--s));line-height:1.6;white-space:pre-wrap;color:var(--ink)}
/* nav */
.sc-nav{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.sc-nav button{border:1px solid var(--l2);background:var(--panel);border-radius:14px;padding:13px;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px}
.sc-nav button.nxt{background:linear-gradient(170deg,var(--G),var(--Gd));color:#071408;border-color:transparent}
.sc-nav button:disabled{opacity:.3}
.sc-jump{display:flex;gap:6px;overflow-x:auto;padding:12px 2px 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:0 0 auto;max-width:640px;margin:0 auto;width:100%;padding-left:14px;padding-right:14px}
.sc-jump::-webkit-scrollbar{display:none}
.sc-jump button{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--mut);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:800;white-space:nowrap;max-width:155px;overflow:hidden;text-overflow:ellipsis}
.sc-jump button.cur{background:var(--Gs);color:var(--ink);border-color:var(--Gd)}

/* ─── modals ─── */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(6,11,14,.82);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:flex-end}
.overlay[hidden]{display:none}
.modal{background:var(--panel);border-radius:22px 22px 0 0;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
.modal-drag{width:40px;height:4px;border-radius:2px;background:var(--l2);margin:10px auto 0;flex:0 0 auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);flex:0 0 auto}
.modal-hd h3{margin:0;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
.modal-body{overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;flex:1}
.modal-foot{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px;flex:0 0 auto}
.modal-foot .btn{flex:1}
/* picker */
.picker-search{padding:9px 14px;border-bottom:1px solid var(--line);flex:0 0 auto}
.picker-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.pi{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
.pi:last-child{border-bottom:0}
.pi-title{font-size:13.5px;font-weight:900;text-transform:uppercase}
.pi-meta{font-size:11px;color:var(--mut);margin-top:2px}
.pi-add{width:34px;height:34px;border-radius:999px;background:var(--Gs);border:2px solid var(--Gd);color:var(--G);font-size:19px;display:grid;place-items:center}
.pi.added .pi-add{background:var(--p2);border-color:var(--l2);color:var(--mut)}
.added-cnt{background:var(--G);color:#071408;font-weight:900;font-size:12.5px;border-radius:999px;padding:3px 10px}
/* musician section in song form */
.mus-section{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:12px}
.mus-section-hd{background:var(--p2);padding:10px 12px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.mus-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.mus-cell{padding:10px 12px;border-top:1px solid var(--line)}
.mus-cell:nth-child(even){border-left:1px solid var(--line)}
.mus-cell .fl{margin:0 0 5px;font-size:10.5px}
.mus-cell textarea{min-height:60px;font-size:14px;padding:7px 9px}

/* ─── print preview ─── */
.prv-wrap{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.prv-box{overflow:hidden;border-radius:4px;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.5)}

/* ─── FEUILLE DE SCÈNE (shared screen+print styles) ─── */
.sheet{width:210mm;height:297mm;background:#fff;color:#172027;padding:7mm 8mm;
  display:flex;flex-direction:column;
  print-color-adjust:exact;-webkit-print-color-adjust:exact}
.sh-hd{display:flex;justify-content:space-between;align-items:center;
  border-bottom:2pt solid #172027;padding-bottom:2.5mm;margin-bottom:2.5mm}
.sh-brand{font-size:19pt;font-weight:900;letter-spacing:-.5px;display:flex;align-items:center;gap:1.5mm}
.sh-brand img{width:11mm;height:11mm;object-fit:contain}
.sh-info{text-align:right;font-size:7.5pt;color:#445;line-height:1.4}
.sh-info b{font-size:9pt;font-weight:900;color:#172027}
.sh-rows{border:1pt solid #8c969c;border-radius:2mm;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
/* Each song row */
.sh-row{display:grid;grid-template-columns:20mm 1fr 36mm;border-bottom:1pt solid #c0c8cc;flex:1;min-height:0;overflow:hidden}
.sh-row:last-child{border-bottom:0}
.sh-row.rsp{grid-template-columns:1fr;flex:0 0 5.5mm;background:#fffaf0}
.sh-row.rsp .rc{display:flex;align-items:center;justify-content:center;gap:2mm;font-size:6.5pt;font-weight:900;letter-spacing:.15em;color:#a07000}
.sh-row.rsp .rc hr{flex:1;border:0;border-top:.5pt dashed #c8a040}
/* col 1: number */
.sh-nb{border-right:1pt solid #c0c8cc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1mm;padding:1.5mm}
.sh-nn{font-size:24pt;font-weight:900;color:#268024;line-height:1}
.sh-td{width:5mm;height:2mm;border-radius:.8mm}
.sh-tc-chg{font-size:5.5pt;font-weight:900;color:#a06010;text-align:center;line-height:1.1}
/* col 2: title + cues */
.sh-main{display:flex;flex-direction:column;justify-content:center;padding:.8mm 2mm;overflow:hidden;min-width:0;gap:.3mm}
.sh-title-row{display:flex;align-items:baseline;gap:2mm;min-width:0;overflow:hidden}
.sh-title{font-size:22pt;font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sh-bpm{font-size:10pt;font-weight:900;color:#268024;white-space:nowrap;flex:0 0 auto}
.sh-pub{font-size:7.5pt;font-weight:800;text-transform:uppercase;color:#1050c0;line-height:1.1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sh-vig{font-size:7.5pt;font-weight:800;text-transform:uppercase;color:#c01010;line-height:1.1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
/* col 3: enchaîn + après */
.sh-side{border-left:1pt solid #c0c8cc;display:flex;flex-direction:column;justify-content:center;padding:.8mm 1.5mm;overflow:hidden;gap:.5mm}
.sh-enc{font-size:7.5pt;font-weight:800;text-transform:uppercase;color:#172027;line-height:1.1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sh-par{font-size:7.5pt;font-weight:800;text-transform:uppercase;color:#107040;line-height:1.1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sh-enc::before{content:"➡️ ";font-size:6pt}
.sh-par::before{content:"💬 ";font-size:6pt}
/* footer */
.sh-foot{margin-top:2.5mm;display:flex;align-items:center;gap:2mm}
.sh-motto{flex:1;border:1.5pt solid #268024;border-radius:2.5mm;padding:1.5mm 3mm;font-size:9.5pt;font-weight:900;text-transform:uppercase;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sh-by{font-size:5.5pt;color:#778;flex:0 0 auto}
.sh-legend{font-size:6pt;font-weight:800;text-transform:uppercase;color:#556;flex:0 0 auto}

/* ─── print ─── */
#sheets-area{display:none}
@page{size:A4 portrait;margin:0}
@media print{
  body{background:#fff;padding:0}
  .hd,.app,.overlay,.scene-ov{display:none!important}
  #sheets-area{display:block}
  .sheet{page-break-after:always;break-after:page}
  .sheet:last-child{page-break-after:auto;break-after:auto}
}
</style>
</head>
<body>
<header class="hd">
  <div class="hd-row">
    <img class="logo" id="logoImg" alt="">
    <div class="brand"><b>Green Mouse</b><small>Studio</small></div>
    <div class="hd-acts">
      <button class="ico-btn" onclick="exportJSON()" title="Exporter">⬆</button>
      <button class="ico-btn" onclick="document.getElementById('importFile').click()" title="Importer">⬇</button>
      <input id="importFile" type="file" accept=".json" hidden onchange="importJSON(event)">
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-set" onclick="showTab('set')"><span class="ti">🎸</span>Set-list</button>
    <button class="tab" id="tab-biblio" onclick="showTab('biblio')"><span class="ti">📚</span>Biblio</button>
    <button class="tab" id="tab-journal" onclick="showTab('journal')"><span class="ti">📓</span>Journal</button>
    <button class="tab" id="tab-analyse" onclick="showTab('analyse')"><span class="ti">📊</span>Analyse</button>
  </div>
</header>

<main class="app">
<div id="v-set" class="view on">
  <div class="set-bar">
    <select class="set-select" id="setSelect" onchange="switchSet(this.value)"></select>
    <button class="btn sm" onclick="createSet()">＋</button>
    <button class="btn sm ghost" onclick="manageSet()">⚙</button>
    <button class="btn sm g" onclick="openScene()" title="Mode Scène">🎚️</button>
    <button class="btn sm" onclick="openPrint()" title="Imprimer">🖨</button>
  </div>
  <div class="set-stats" id="setStats"></div>
  <div id="setList"></div>
  <button class="btn g" style="width:100%;margin-top:5px" onclick="openPicker()">＋ Ajouter depuis la bibliothèque</button>
</div>

<div id="v-biblio" class="view">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input type="text" id="biblioSearch" placeholder="🔍 Rechercher…" oninput="renderBiblio()" style="flex:1">
    <button class="btn g" onclick="openSongForm(null)">＋ Nouveau</button>
  </div>
  <div class="card"><div id="biblioList"></div></div>
</div>

<div id="v-journal" class="view">
  <div class="jtype-bar">
    <button class="jtype-btn" onclick="openJournalForm('repete')">🥁 Nouvelle répète</button>
    <button class="jtype-btn" onclick="openJournalForm('concert')">🎤 Nouveau concert</button>
  </div>
  <div id="journalList"></div>
</div>

<div id="v-analyse" class="view">
  <div class="atabs">
    <button class="atab on" onclick="showATab('chrono')">📋 Chronologie</button>
    <button class="atab" onclick="showATab('energie')">⚡ Énergie</button>
    <button class="atab" onclick="showATab('cues')">📌 Points clés</button>
    <button class="atab" onclick="showATab('sante')">💊 Santé</button>
    <button class="atab" onclick="showATab('hist')">🗓 Historique</button>
  </div>
  <div id="asc-chrono" class="asec on"></div>
  <div id="asc-energie" class="asec"></div>
  <div id="asc-cues" class="asec"></div>
  <div id="asc-sante" class="asec"></div>
  <div id="asc-hist" class="asec"></div>
</div>
</main>

<div id="sheets-area"></div>

<!-- ═══ SCÈNE ═══ -->
<div id="sceneMode" class="scene-ov" hidden>
  <div class="sc-hd">
    <div class="sc-counter"><b id="scNum">01</b> / <span id="scTot">17</span></div>
    <div class="sc-scale">
      <button onclick="chgScale(-1)">T−</button>
      <span id="scScaleLbl">1×</span>
      <button onclick="chgScale(1)">T+</button>
    </div>
    <button class="wake-btn" id="wakeBtn" onclick="toggleWake()" hidden>💡</button>
    <button class="sc-close" onclick="closeScene()">✕</button>
  </div>
  <div class="sc-chrono">
    <span class="sc-chrono-time">⏱ <span id="chronoSong">00:00</span></span>
    <span class="sc-chrono-sep">·</span>
    <span class="sc-chrono-time">Set <span id="chronoSet">00:00</span></span>
    <button class="chrono-btn" id="chronoToggleBtn" onclick="toggleSongTimer()">▶ Démarrer</button>
    <button class="chrono-save" onclick="saveSongDuration()" title="Sauver la durée mesurée dans la fiche">💾 Sauver durée</button>
  </div>
  <div class="sc-prog"><div class="sc-prog-bar"><div class="sc-prog-fill" id="scBar"></div></div></div>
  <div class="sc-vsw">
    <button class="svb on" id="svb-cues" onclick="setScView('cues')">🎸 Cues</button>
    <button class="svb" id="svb-lyrics" onclick="setScView('lyrics')">📝 Paroles</button>
    <button class="svb" id="svb-musicians" onclick="setScView('musicians')">👤 Musiciens</button>
  </div>
  <div class="sc-body" id="scBody"></div>
  <div class="sc-nav" style="max-width:640px;margin:8px auto 0;padding:0 14px;flex:0 0 auto">
    <button id="scPrev" onclick="scStep(-1)">◀ Précédent</button>
    <button id="scNext" class="nxt" onclick="scStep(1)">Suivant ▶</button>
  </div>
  <div class="sc-jump" id="scJump"></div>
</div>

<!-- PICKER -->
<div class="overlay" id="pickerOverlay" hidden onclick="if(event.target===this)closePicker()">
  <div class="modal" style="max-height:92vh">
    <div class="modal-drag"></div>
    <div class="modal-hd">
      <h3>Ajouter au set</h3>
      <span class="added-cnt" id="addedCnt" hidden>0 ajouté</span>
      <button class="btn sm ghost" onclick="closePicker()">Fermer</button>
    </div>
    <div class="picker-search"><input type="text" id="pickerSearch" placeholder="🔍 Rechercher…" oninput="renderPicker()"></div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<!-- SONG FORM -->
<div class="overlay" id="songOverlay" hidden onclick="if(event.target===this)closeSongForm()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-hd"><h3 id="sfTitle">Nouveau morceau</h3><button class="ico-btn" onclick="closeSongForm()">✕</button></div>
    <div class="modal-body">
      <label class="fl">Titre</label>
      <input id="sf-title" type="text" placeholder="NOM DU TITRE">
      <div class="row3" style="margin-top:10px">
        <div><label class="fl">Durée</label><input id="sf-duree" type="text" placeholder="3:30"></div>
        <div><label class="fl">BPM</label><input id="sf-bpm" type="number" placeholder="120" min="40" max="280"></div>
        <div><label class="fl">Accordage</label><input id="sf-tuning" type="text" placeholder="D#"></div>
      </div>
      <label class="fl" style="margin-top:12px">⚡ Énergie globale</label>
      <div class="en-btns" id="sf-en-btns">
        <button class="en-btn" data-v="1" onclick="setSfEn(1,this)">💤 1</button>
        <button class="en-btn" data-v="2" onclick="setSfEn(2,this)">🎵 2</button>
        <button class="en-btn" data-v="3" onclick="setSfEn(3,this)">🎸 3</button>
        <button class="en-btn" data-v="4" onclick="setSfEn(4,this)">⚡ 4</button>
        <button class="en-btn" data-v="5" onclick="setSfEn(5,this)">🔥 5</button>
      </div>
      <div class="row2" style="margin-top:10px">
        <div><label class="fl">▶ Début</label>
          <div class="se-btns">
            <button class="se-btn" data-se="start" data-v="calm" onclick="setSfSE('start','calm',this)">🌙 Calme</button>
            <button class="se-btn" data-se="start" data-v="intense" onclick="setSfSE('start','intense',this)">⚡ Fort</button>
          </div>
        </div>
        <div><label class="fl">⏹ Fin</label>
          <div class="se-btns">
            <button class="se-btn" data-se="end" data-v="calm" onclick="setSfSE('end','calm',this)">🌙 Calme</button>
            <button class="se-btn" data-se="end" data-v="intense" onclick="setSfSE('end','intense',this)">⚡ Fort</button>
          </div>
        </div>
      </div>
      <label class="fl" style="margin-top:12px">📝 Paroles / texte</label>
      <textarea id="sf-lyrics" style="min-height:100px" placeholder="Colle ou saisis les paroles ici…"></textarea>
      <label class="fl">Notes générales</label>
      <textarea id="sf-notes" placeholder="Anecdotes, difficultés, références…"></textarea>
      <div class="mus-section">
        <div class="mus-section-hd">👤 Annotations par musicien</div>
        <div class="mus-grid">
          <div class="mus-cell"><label class="fl">🎤 Voix / Chant</label><textarea id="sf-voix" placeholder="Placement vocal, harmonies…"></textarea></div>
          <div class="mus-cell"><label class="fl">🥁 Batterie</label><textarea id="sf-batt" placeholder="Pattern, fills, tempo…"></textarea></div>
          <div class="mus-cell"><label class="fl">🎸 Guitare</label><textarea id="sf-guit" placeholder="Accords, riffs, effets…"></textarea></div>
          <div class="mus-cell"><label class="fl">🎺 Basse</label><textarea id="sf-basse" placeholder="Ligne de basse, positions…"></textarea></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn red sm" id="sfDelBtn" onclick="deleteSong()">🗑</button>
      <button class="btn g" style="flex:1" onclick="saveSong()">✅ Enregistrer</button>
    </div>
  </div>
</div>

<!-- JOURNAL FORM -->
<div class="overlay" id="jOverlay" hidden onclick="if(event.target===this)closeJForm()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-hd"><h3 id="jFormTitle">Nouvelle répète</h3><button class="ico-btn" onclick="closeJForm()">✕</button></div>
    <div class="modal-body">
      <div class="row2">
        <div><label class="fl">Date</label><input id="jf-date" type="date"></div>
        <div><label class="fl" id="jf-vl">Lieu</label><input id="jf-venue" type="text" placeholder="Salle de répète…"></div>
      </div>
      <div id="jf-setRow" style="display:none"><label class="fl">Set joué</label><select id="jf-set"></select></div>
      <label class="fl">Morceaux</label>
      <div id="jf-songs"></div>
      <label class="fl" style="margin-top:12px">Note globale</label>
      <div class="rating-btns">
        <button class="rb g" data-v="good" onclick="setGR('good',this)">🟢 Super</button>
        <button class="rb y" data-v="ok" onclick="setGR('ok',this)">🟡 Correct</button>
        <button class="rb r" data-v="bad" onclick="setGR('bad',this)">🔴 Difficile</button>
      </div>
      <label class="fl" style="margin-top:12px">Observation</label>
      <textarea id="jf-note" placeholder="Ce qui s'est passé…"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeJForm()">Annuler</button>
      <button class="btn g" style="flex:1" onclick="saveJEntry()">✅ Enregistrer</button>
    </div>
  </div>
</div>

<!-- SET MANAGE -->
<div class="overlay" id="smOverlay" hidden onclick="if(event.target===this)closeManSet()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-hd"><h3>Gérer le set</h3><button class="ico-btn" onclick="closeManSet()">✕</button></div>
    <div class="modal-body">
      <label class="fl">Nom</label><input id="sm-name" type="text">
      <label class="fl" style="margin-top:12px">Devise (bas de feuille)</label><input id="sm-motto" type="text" placeholder="Jouez fort !">
    </div>
    <div class="modal-foot">
      <button class="btn red sm" id="smDelBtn" onclick="deleteSet()">🗑</button>
      <button class="btn ghost sm" onclick="duplicateSet()">📋</button>
      <button class="btn g" style="flex:1" onclick="saveSetMeta()">✅ OK</button>
    </div>
  </div>
</div>

<!-- PRINT PREVIEW -->
<div class="overlay" id="printOverlay" hidden onclick="if(event.target===this)closePrint()">
  <div class="modal" style="max-height:95vh">
    <div class="modal-drag"></div>
    <div class="modal-hd"><h3>Aperçu de la feuille</h3><button class="ico-btn" onclick="closePrint()">✕</button></div>
    <div class="modal-body" id="printBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closePrint()">Fermer</button>
      <button class="btn g" style="flex:1" onclick="window.print()">🖨 Imprimer / PDF</button>
    </div>
  </div>

const uid=()=>Math.random().toString(36).slice(2,9);
const pad=n=>String(n).padStart(2,'0');
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const splitN=s=>(s||'').split('\n').map(x=>x.trim()).filter(Boolean);
const firstLine=s=>((s||'').split('\n')[0]||'').trim();
function parseSec(s){if(!s)return 0;const m=String(s).trim().match(/^(\d+):(\d{1,2})$/);if(m)return+m[1]*60+ +m[2];const n=parseFloat(s);return isNaN(n)?0:Math.round(n*60);}
function fmtDur(s){if(!s)return'';const m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}
function fmtMs(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return pad(m)+':'+(s%60<10?'0':'')+(s%60);}
function totalDur(items){return fmtDur(items.reduce((a,it)=>a+(parseSec(song(it.songId).duree)||0),0));}
function cumulSec(items,to){return items.slice(0,to).reduce((a,it)=>a+(parseSec(song(it.songId).duree)||0),0);}
function cumulStr(items,to){return fmtDur(cumulSec(items,to));}

function renderSetSelector(){const s=document.getElementById('setSelect');s.innerHTML=state.sets.map(x=>`<option value="${x.id}"${x.id===state.activeSetId?' selected':''}>${esc(x.name)}</option>`).join('');}
function switchSet(id){state.activeSetId=id;persist();renderSet();}
function renderSet(){
  renderSetSelector();const set=as(),items=set.items;
  const tc=tuneMap(state.songs,items);
  const tunes=items.map(it=>(state.songs[it.songId]?.tuning||'').trim());
  const tuneChanges=tunes.filter((t,i)=>i>0&&t&&tunes[i-1]&&t!==tunes[i-1]).length;
  document.getElementById('setStats').innerHTML=`<div class="stat-box"><div class="sv">${totalDur(items)||'—'}</div><div class="sl">⏱ Durée</div></div><div class="stat-box"><div class="sv">${items.length}</div><div class="sl">🎵 Titres</div></div><div class="stat-box"><div class="sv">${tuneChanges}</div><div class="sl">🎸 Chang. acc.</div></div>`;
  if(!items.length){document.getElementById('setList').innerHTML=`<div class="empty">Set vide</div>`;return;}
  document.getElementById('setList').innerHTML=items.map((it,i)=>{
    const s=song(it.songId);const tuning=(s.tuning||'').trim();const tColor=tuning&&tc[tuning]?tc[tuning]:'';
    const prevTune=i>0?(state.songs[items[i-1].songId]?.tuning||'').trim():'';const tuneChg=tuning&&prevTune&&tuning!==prevTune;
    const enLv=s.energyLevel||0;const hasCues=['depart','public','technique','vigilance','enchainement','parole'].some(k=>it[k]);
    return`<div class="si" id="si_${it.id}">
      <div class="si-row" onclick="toggleSI('${it.id}')">
        <div class="si-num" style="${enLv?'background:'+EN_COLORS[enLv]+';color:'+EN_TEXT[enLv]+';border-radius:10px 0 0 10px':''}">${pad(i+1)}</div>
        <div class="si-info">
          <div class="si-title">${esc(s.title)}</div>
          <div class="si-meta">${s.duree?`<span>⏱${s.duree}</span>`:''}${s.bpm?`<span>♩${s.bpm}</span>`:''}${tuning?`<span class="dot" style="background:${tColor||'var(--mut2)'}"></span><span>${esc(tuning)}</span>`:''}${tuneChg?`<span style="color:var(--amb);font-size:10.5px">↻ ${esc(tuning)}</span>`:''}${it.rappel?`<span style="color:var(--amb);font-size:10px">🔁</span>`:''}${hasCues?`<span style="color:var(--G);font-size:10px">●</span>`:''}
          </div>
        </div>
        <div class="si-acts" onclick="event.stopPropagation()">
          <span class="si-cumul">${cumulStr(items,i)||''}</span>
          <button onclick="moveItem('${it.id}',-1)">↑</button>
          <button onclick="moveItem('${it.id}',1)">↓</button>
          <button onclick="removeItem('${it.id}')" style="color:var(--red)">✕</button>
          <span class="expand-ico">▾</span>
        </div>
      </div>
      <div class="si-cues">
        <div class="cue-grid">
          ${['depart','public','technique','vigilance','enchainement','parole'].map(k=>`<div class="cue-field"><label class="fl">${{'depart':'🥁 Départ','public':'🎤 Public','technique':'🎸 Son','vigilance':'⚠️ Vigilance','enchainement':'➡️ Enchaîn.','parole':'💬 Après'}[k]}</label><textarea oninput="saveCue('${it.id}','${k}',this.value)">${esc(it[k])}</textarea></div>`).join('')}
        </div>
        <label class="rappel-tog"><input type="checkbox"${it.rappel?' checked':''} onchange="saveCue('${it.id}','rappel',this.checked)"> 🔁 Rappel / Encore</label>

function toggleSI(id){document.getElementById('si_'+id)?.classList.toggle('expanded');}
function saveCue(id,f,v){const it=as().items.find(x=>x.id===id);if(it){it[f]=f==='rappel'?!!v:v;persist();}}
function moveItem(id,d){const a=as().items,i=a.findIndex(x=>x.id===id),j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];persist();renderSet();}

/* ── SONG STATS ── */
function songStats(sid){
  const entries=state.journal.filter(e=>e.entries.some(x=>x.songId===sid));
  const rep=entries.filter(e=>e.type==='repete'),con=entries.filter(e=>e.type==='concert');
  const rv={'good':3,'ok':2,'bad':1};const vals=entries.flatMap(e=>e.entries.filter(x=>x.songId===sid).map(x=>rv[x.rating]||2));
  const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  const last=[...entries].sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||null;
  let status='unknown';if(avg!==null){if(avg>=2.5&&rep.length>=2)status='good';else if(avg>=1.5)status='ok';else status='bad';}
  return{rehearsalCount:rep.length,concertCount:con.length,lastDate:last,avg,status};
}
function sdot(s){if(s==='good')return`<span class="sdot sd-g">🟢 OK</span>`;if(s==='ok')return`<span class="sdot sd-y">🟡 À travailler</span>`;if(s==='bad')return`<span class="sdot sd-r">🔴 Problème</span>`;return`<span class="sdot sd-x">— Pas de données</span>`;}

function renderAchrono(){
  const items=as().items;if(!items.length){document.getElementById('asc-chrono').innerHTML=`<div class="empty">Set vide</div>`;return;}
  const tc=tuneMap(state.songs,items);
  const totalS=items.reduce((a,it)=>a+(parseSec(song(it.songId).duree)||30),0);
  const segs=items.map(it=>{const s=song(it.songId);const t=(s.tuning||'').trim();return{t,w:((parseSec(s.duree)||30)/totalS*100).toFixed(1),color:t&&tc[t]?tc[t]:'#374f5c'};});
  const band=`<div class="en-bar">${segs.map(b=>`<div class="en-seg" style="flex:0 0 ${b.w}%;background:${b.color}" title="${esc(b.t)}"></div>`).join('')}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${[...new Set(segs.map(b=>b.t).filter(Boolean))].map(t=>`<span style="font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px"><span class="dot" style="background:${tc[t]}"></span>${esc(t)}</span>`).join('')}</div>`;
  const rows=items.map((it,i)=>{const s=song(it.songId);const tuning=(s.tuning||'').trim();const tColor=tuning&&tc[tuning]?tc[tuning]:'var(--mut2)';const tuneChg=tuning&&i>0&&(state.songs[items[i-1].songId]?.tuning||'').trim()!==tuning&&(state.songs[items[i-1].songId]?.tuning||'').trim();const enLv=s.energyLevel||0;
    return`<tr><td>${pad(i+1)}</td><td style="font-weight:900;text-transform:uppercase;font-size:12.5px">${esc(s.title)}${it.rappel?` <span style="color:var(--amb);font-size:10px">🔁</span>`:''}</td><td style="color:var(--mut);text-align:center">${cumulStr(items,i)||'—'}</td><td style="color:var(--mut);text-align:center">${s.duree||'—'}</td><td style="text-align:center">${s.bpm?`<b>${s.bpm}</b>`:'—'}</td><td>${tuning?`<span class="dot" style="background:${tColor}"></span>`:''}${tuneChg?` <span class="tune-ch">↻ ${esc(tuning)}</span>`:''}</td><td>${enLv?`<span style="background:${EN_COLORS[enLv]};color:${EN_TEXT[enLv]};border-radius:5px;padding:2px 5px;font-size:10.5px;font-weight:800">${enLv}</span>`:'—'}</td></tr>`;}).join('');
  document.getElementById('asc-chrono').innerHTML=`<div class="card"><div class="card-hd"><h2>🎸 Accordages</h2></div><div class="card-body">${band}</div></div><div class="card" style="margin-top:12px"><div class="card-hd"><h2>⏱ Chronologie — total ${totalDur(items)}</h2></div><div style="overflow-x:auto"><table class="chrono-tbl"><thead><tr><th>#</th><th>Titre</th><th>Cumulé</th><th>Durée</th><th>BPM</th><th>Accord.</th><th>Én.</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function renderAenergie(){
  const items=as().items;if(!items.length){document.getElementById('asc-energie').innerHTML=`<div class="empty">Set vide</div>`;return;}
  const totalS=items.reduce((a,it)=>a+(parseSec(song(it.songId).duree)||30),0);
  const enSegs=items.map((it,i)=>{const s=song(it.songId);const lv=s.energyLevel||0;return{lv,w:((parseSec(s.duree)||30)/totalS*100).toFixed(1),title:s.title,i:i+1};});
  const enBar=`<div class="en-bar" style="height:26px">${enSegs.map(seg=>`<div style="flex:0 0 ${seg.w}%;background:${seg.lv?EN_COLORS[seg.lv]:'#1a2e3c'};position:relative" title="${pad(seg.i)} ${esc(seg.title)}"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;font-weight:800;color:#fff;white-space:nowrap">${pad(seg.i)}</span></div>`).join('')}</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${[1,2,3,4,5].map(l=>`<span style="font-size:11px;font-weight:800;background:${EN_COLORS[l]};color:${EN_TEXT[l]};padding:2px 7px;border-radius:4px">${EN_LABELS[l]}</span>`).join('')}</div>`;
  // SVG BPM + energy chart
  const enVals=items.map(it=>song(it.songId).energyLevel||0);const bpmVals=items.map(it=>+song(it.songId).bpm||0);
  const validBpm=bpmVals.filter(Boolean);let svgChart='';
  if(items.length>1){const W=400,H=90,n=items.length;const px=i=>10+(i/(n-1))*380;const pyEn=v=>v?H-8-((v-1)/4)*(H-18):null;const mn=Math.min(...(validBpm.length?validBpm:[60]))-10,mx=Math.max(...(validBpm.length?validBpm:[200]))+10;const pyBpm=v=>v?H-8-((v-mn)/(mx-mn))*(H-18):null;const enPts=enVals.map((v,i)=>[px(i),pyEn(v)]).filter(p=>p[1]!==null);const bpmPts=bpmVals.map((v,i)=>[px(i),pyBpm(v)]).filter(p=>p[1]!==null);svgChart=`<div style="margin-top:10px;overflow:hidden;border-radius:8px"><svg viewBox="0 0 ${W} ${H+20}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block"><defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${EN_TEXT[3]}" stop-opacity=".2"/><stop offset="100%" stop-color="${EN_TEXT[3]}" stop-opacity="0"/></linearGradient></defs>${bpmPts.length>1?`<path d="M${bpmPts.map(p=>p.join(',')).join('L')}" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>`:''}${enPts.length>1?`<path d="M${enPts[0][0]},${H}L${enPts.map(p=>p.join(',')).join('L')}L${enPts[enPts.length-1][0]},${H}Z" fill="url(#eg)"/><path d="M${enPts.map(p=>p.join(',')).join('L')}" fill="none" stroke="${EN_TEXT[3]}" stroke-width="2.5" stroke-linejoin="round"/>`:''}${enVals.map((v,i)=>v?`<circle cx="${px(i)}" cy="${pyEn(v)}" r="3.5" fill="${EN_TEXT[v]}"/>`:'').join('')}${items.map((it,i)=>`<text x="${px(i)}" y="${H+14}" text-anchor="middle" style="font-size:8px;fill:var(--mut)">${pad(i+1)}</text>`).join('')}</svg><div style="display:flex;gap:10px;font-size:11px;font-weight:800;color:var(--mut);margin-top:3px"><span style="color:${EN_TEXT[3]}">── Énergie</span>${validBpm.length>1?`<span style="color:var(--blue)">- - BPM</span>`:''}</div></div>`;}
  const flags=[];
  for(let i=1;i<items.length;i++){const a=song(items[i-1].songId),b=song(items[i].songId);const la=a.energyLevel||0,lb=b.energyLevel||0;if(la&&lb&&Math.abs(la-lb)>=3)flags.push({ic:'⚡',t:`Rupture brutale n°${pad(i)}→${pad(i+1)}`,d:`${esc(a.title)} (${la}) → ${esc(b.title)} (${lb})`});if(la&&lb&&la<=2&&lb<=2)flags.push({ic:'😴',t:`Double calme n°${pad(i)}→${pad(i+1)}`,d:`${esc(a.title)} et ${esc(b.title)} — risque de perte d'attention`});if(a.endEnergy==='intense'&&b.startEnergy==='calm')flags.push({ic:'❄️',t:`Refroidissement n°${pad(i+1)}`,d:`${esc(b.title)} démarre calme après un morceau fort`});}
  const highEn=items.filter(it=>song(it.songId).energyLevel>=4);const lowEn=items.filter(it=>song(it.songId).energyLevel&&song(it.songId).energyLevel<=2);
  if(highEn.length>items.length*.7)flags.push({ic:'🔥',t:'Set très intense',d:`${highEn.length}/${items.length} morceaux en énergie ≥4`});
  if(lowEn.length>items.length*.5)flags.push({ic:'🧊',t:'Set peu dynamique',d:`${lowEn.length}/${items.length} morceaux en énergie ≤2`});
  const climax=items.findIndex((it,i,a)=>i>0&&(song(it.songId).energyLevel||0)===5&&(song(a[i-1].songId).energyLevel||0)<5);
  if(climax>-1)flags.push({ic:'🏔️',t:`Premier climax n°${pad(climax+1)}`,d:esc(song(items[climax].songId).title)});
  const flagHtml=flags.length?flags.map(f=>`<div class="energy-flag"><div class="ef-ic">${f.ic}</div><div><div class="ef-title">${f.t}</div><div class="ef-detail">${f.d}</div></div></div>`).join(''):`<div style="color:var(--mut2);font-size:13px;padding:6px 0">✅ Aucun problème de flux détecté</div>`;
  document.getElementById('asc-energie').innerHTML=`<div class="card"><div class="card-hd"><h2>🎨 Arc d'énergie</h2></div><div class="card-body">${enBar}${svgChart}</div></div><div class="card" style="margin-top:12px"><div class="card-hd"><h2>🔍 Diagnostic</h2></div><div class="card-body" style="padding:10px 14px">${flagHtml}</div></div>`;
}

function renderAcues(){
  const items=as().items;
  const cats=[{k:'vigilance',icon:'⚠️',label:'Points de vigilance',color:'var(--red)'},{k:'public',icon:'🎤',label:'Prises de parole public',color:'var(--G)'},{k:'enchainement',icon:'➡️',label:'Enchaînements',color:'var(--amb)'},{k:'depart',icon:'🥁',label:'Départs / batterie',color:'var(--blue)'},{k:'parole',icon:'💬',label:'Phrases après',color:'var(--mint)'}];
  let html='';
  for(const c of cats){const lines=items.flatMap((it,i)=>splitN(it[c.k]).map(t=>({num:i+1,title:song(it.songId).title,text:t})));if(!lines.length)continue;html+=`<div class="card" style="margin-bottom:12px"><div class="card-hd"><span>${c.icon}</span><h2>${esc(c.label)}</h2></div><div class="card-body" style="padding:0">${lines.map(l=>`<div class="kl"><div class="kl-num">${pad(l.num)}</div><div><div class="kl-title">${esc(l.title)}</div><div class="kl-content" style="color:${c.color}">${esc(l.text)}</div></div></div>`).join('')}</div></div>`;}
  if(!html)html=`<div class="card"><div class="card-body"><div class="empty">Aucune note dans le set</div></div></div>`;
  document.getElementById('asc-cues').innerHTML=html;
}

function renderAsante(){
  const songs=Object.values(state.songs).sort((a,b)=>a.title.localeCompare(b.title));
  const tblRows=songs.map(s=>{const st=songStats(s.id);return`<tr><td>${esc(s.title)}</td><td style="text-align:center;color:var(--blue)">${st.rehearsalCount||'—'}</td><td style="text-align:center;color:var(--pur)">${st.concertCount||'—'}</td><td style="text-align:center;font-size:11.5px;color:var(--mut)">${st.lastDate||'—'}</td><td>${sdot(st.status)}</td></tr>`;}).join('');
  const maxR=Math.max(...songs.map(s=>songStats(s.id).rehearsalCount),1);
  const bars=[...songs].sort((a,b)=>songStats(b.id).rehearsalCount-songStats(a.id).rehearsalCount).filter(s=>songStats(s.id).rehearsalCount>0).map(s=>{const c=songStats(s.id).rehearsalCount;return`<div class="stat-row"><div style="font-size:18px;font-weight:900;color:var(--G);width:24px;text-align:center;flex:0 0 auto">${c}</div><div style="font-size:12.5px;font-weight:900;text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.title)}</div><div style="width:80px"><div style="height:7px;border-radius:4px;background:var(--blue);width:${(c/maxR*100).toFixed(0)}%"></div></div></div>`;}).join('');
  document.getElementById('asc-sante').innerHTML=`<div class="card"><div class="card-hd"><h2>💊 État par morceau</h2></div><div style="overflow-x:auto"><table class="health-tbl"><thead><tr><th>Morceau</th><th>🥁</th><th>🎤</th><th>Dernière fois</th><th>État</th></tr></thead><tbody>${tblRows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--mut2)">Aucun journal</td></tr>'}</tbody></table></div></div>${bars?`<div class="card" style="margin-top:12px"><div class="card-hd"><h2>🥁 Fréquence répète</h2></div><div class="card-body" style="padding-top:8px">${bars}</div></div>`:''}`;
}

function renderAhist(){
  const concerts=[...state.journal].filter(e=>e.type==='concert').sort((a,b)=>b.date.localeCompare(a.date));
  const reps=[...state.journal].filter(e=>e.type==='repete').sort((a,b)=>b.date.localeCompare(a.date));
  const cHTML=concerts.map(e=>{const sn=state.sets.find(s=>s.id===e.setId)?.name||'—';const gc=e.globalRating==='good'?'🟢':e.globalRating==='bad'?'🔴':'🟡';
    return`<div class="card" style="margin-bottom:10px"><div class="card-hd">${gc}<div><h2>${esc(e.venue||'—')}</h2><div style="font-size:11.5px;color:var(--mut)">${e.date} · ${sn}</div></div></div>${e.globalNote?`<div class="card-body" style="padding-top:8px;font-size:13px;font-style:italic;color:var(--mut)">${esc(e.globalNote)}</div>`:''}<div class="card-body" style="padding-top:${e.globalNote?'0':'8px'}"><div style="display:flex;flex-wrap:wrap;gap:4px">${e.entries.map(x=>{const s=state.songs[x.songId];if(!s)return'';return`<span class="song-pill ${x.rating==='good'?'g':x.rating==='bad'?'r':'y'}">${esc(s.title)}</span>`;}).join('')}</div></div></div>`;}).join('');
  const rHTML=reps.map(e=>{const gc=e.globalRating==='good'?'🟢':e.globalRating==='bad'?'🔴':'🟡';
    return`<div class="je"><div class="je-badge rep">🥁</div><div><div style="font-size:14px;font-weight:900">${esc(e.venue||'Répète')} ${gc} <span style="font-size:11px;color:var(--mut)">${e.date}</span></div>${e.globalNote?`<div style="font-size:12px;color:var(--mut);margin-top:3px;font-style:italic">${esc(e.globalNote)}</div>`:''}<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${e.entries.map(x=>{const s=state.songs[x.songId];if(!s)return'';return`<span class="song-pill ${x.rating==='good'?'g':x.rating==='bad'?'r':'y'}">${esc(s.title)}</span>`;}).join('')}</div></div></div>`;}).join('');
  document.getElementById('asc-hist').innerHTML=(concerts.length?`<div style="padding:0 0 8px"><span style="font-size:12.5px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)">🎤 ${concerts.length} concert${concerts.length>1?'s':''}</span></div>${cHTML}`:'')+
    (reps.length?`<div style="padding:${concerts.length?'10px':0} 0 8px"><span style="font-size:12.5px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)">🥁 ${reps.length} répète${reps.length>1?'s':''}</span></div><div class="card">${rHTML}</div>`:'')
    +(!concerts.length&&!reps.length?`<div class="card"><div class="card-body"><div class="empty">Pas encore d'historique</div></div></div>`:'');
}

/* ═══════════ SCÈNE ═══════════ */
let scCurrent=0,scView='cues',scMusTab='voix';
let wakeLock=null,wakeWanted=false;
const SCALES=[0.75,1,1.3,1.65],SCALE_L=['0.75×','1×','1.3×','1.65×'];
const CUES=[{k:'depart',ic:'🥁',l:'Départ',cls:'cc-dep'},{k:'public',ic:'🎤',l:'Public',cls:'cc-pub'},{k:'technique',ic:'🎸',l:'Son',cls:'cc-tech'},{k:'vigilance',ic:'⚠️',l:'Vigilance',cls:'cc-vig'},{k:'enchainement',ic:'➡️',l:'Enchaîn.',cls:'cc-enc'},{k:'parole',ic:'💬',l:'Après',cls:'cc-par'}];
const MUS_TABS=[{k:'noteVoix',ic:'🎤',l:'Voix'},{k:'noteBatterie',ic:'🥁',l:'Batt.'},{k:'noteGuitare',ic:'🎸',l:'Guit.'},{k:'noteBasse',ic:'🎺',l:'Basse'}];
// chrono state
let songTimerMs=0,songTimerStart=null,songTimerRunning=false;
let setTimerStart=null,chronoInterval=null;

function openScene(){
  document.getElementById('sceneMode').hidden=false;
  document.body.style.overflow='hidden';
  scCurrent=0;scView='cues';
  songTimerMs=0;songTimerStart=null;songTimerRunning=false;
  setTimerStart=Date.now();
  chronoInterval=setInterval(updateChronoDisplay,500);
  if('wakeLock'in navigator){document.getElementById('wakeBtn').hidden=false;wakeWanted=true;acquireWake();document.getElementById('wakeBtn').classList.add('on');}
  renderScene();
}
function closeScene(){
  document.getElementById('sceneMode').hidden=true;
  document.body.style.overflow='';
  if(chronoInterval){clearInterval(chronoInterval);chronoInterval=null;}
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;wakeWanted=false;}
  document.getElementById('wakeBtn').classList.remove('on');
  stopAutoScroll();
}
async function acquireWake(){try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function toggleWake(){wakeWanted=!wakeWanted;document.getElementById('wakeBtn').classList.toggle('on',wakeWanted);if(wakeWanted)await acquireWake();else{try{await wakeLock?.release();}catch(e){}wakeLock=null;}}
document.addEventListener('visibilitychange',()=>{if(wakeWanted&&document.visibilityState==='visible')acquireWake();});
function chgScale(d){const i=Math.max(0,Math.min(SCALES.length-1,(state.prefs.scaleIdx||1)+d));state.prefs.scaleIdx=i;persist();renderScene();}
function setScView(v){scView=v;['cues','lyrics','musicians'].forEach(x=>document.getElementById('svb-'+x)?.classList.toggle('on',x===v));stopAutoScroll();renderScBody();}
// chrono
function toggleSongTimer(){
  if(songTimerRunning){songTimerMs+=Date.now()-songTimerStart;songTimerStart=null;songTimerRunning=false;document.getElementById('chronoToggleBtn').textContent='▶ Démarrer';document.getElementById('chronoToggleBtn').classList.remove('run');}
  else{songTimerStart=Date.now();songTimerRunning=true;document.getElementById('chronoToggleBtn').textContent='⏸ Pause';document.getElementById('chronoToggleBtn').classList.add('run');}
}
function getSongMs(){return songTimerMs+(songTimerRunning?Date.now()-songTimerStart:0);}
function getSetMs(){return setTimerStart?Date.now()-setTimerStart:0;}
function updateChronoDisplay(){
  document.getElementById('chronoSong').textContent=fmtMs(getSongMs());
  document.getElementById('chronoSet').textContent=fmtMs(getSetMs());
}
function saveSongDuration(){
  const ms=getSongMs();if(ms<2000){alert('Chrono trop court — lance d\'abord le chrono pendant le morceau.');return;}
  const items=as().items;if(!items.length)return;
  const it=items[scCurrent];const s=state.songs[it.songId];if(!s)return;
  const dur=fmtDur(Math.round(ms/1000));
  if(!confirm(`Sauvegarder ${dur} comme durée de "${s.title}" ?`))return;
  s.duree=dur;persist();
  alert(`✅ Durée de "${s.title}" mise à jour : ${dur}`);
}
function resetSongTimerOnNav(){songTimerMs=0;songTimerStart=songTimerRunning?Date.now():null;updateChronoDisplay();}
// scene navigation
function scStep(d){goToScene(scCurrent+d);}
function goToScene(n){scCurrent=Math.max(0,Math.min(n,as().items.length-1));resetSongTimerOnNav();stopAutoScroll();renderScene();}
// auto-scroll
let _scrollRAF=null,_scrollRunning=false,_scrollSpeed=40,_lastScrollTs=null;
function startAutoScroll(){
  _scrollRunning=true;_lastScrollTs=null;
  document.getElementById('sc-autoscroll-btn')?.classList.add('on');
  function frame(ts){if(!_scrollRunning){_lastScrollTs=null;return;}const body=document.getElementById('scBody');if(!body){_scrollRunning=false;return;}if(_lastScrollTs){const dt=(ts-_lastScrollTs)/1000;body.scrollTop+=_scrollSpeed*dt;}if(body.scrollTop>=body.scrollHeight-body.clientHeight-4){_scrollRunning=false;document.getElementById('sc-autoscroll-btn')?.classList.remove('on');return;}_lastScrollTs=ts;_scrollRAF=requestAnimationFrame(frame);}
  _scrollRAF=requestAnimationFrame(frame);
}
function stopAutoScroll(){_scrollRunning=false;document.getElementById('sc-autoscroll-btn')?.classList.remove('on');if(_scrollRAF){cancelAnimationFrame(_scrollRAF);_scrollRAF=null;}}
function toggleAutoScroll(){if(_scrollRunning)stopAutoScroll();else startAutoScroll();}
function changeScrollSpeed(d){_scrollSpeed=Math.max(10,Math.min(150,_scrollSpeed+d*15));document.getElementById('sc-spd-lbl').textContent=Math.round(_scrollSpeed/40*100)+'%';}

function renderScene(){
  const items=as().items;if(!items.length){closeScene();return;}
  scCurrent=Math.max(0,Math.min(scCurrent,items.length-1));
  const it=items[scCurrent];const s=song(it.songId);
  const tc=tuneMap(state.songs,items);const tuning=(s.tuning||'').trim();const tColor=tuning&&tc[tuning]?tc[tuning]:'';
  const sc=SCALES[state.prefs.scaleIdx||1]||1;
  document.getElementById('scNum').textContent=pad(scCurrent+1);
  document.getElementById('scTot').textContent=pad(items.length);
  document.getElementById('scBar').style.width=((scCurrent+1)/items.length*100)+'%';
  document.getElementById('scScaleLbl').textContent=SCALE_L[state.prefs.scaleIdx||1];
  // jump strip
  document.getElementById('scJump').innerHTML=items.map((x,i)=>{const enL=song(x.songId).energyLevel||0;return`<button class="${i===scCurrent?'cur':''}" onclick="goToScene(${i})" style="${enL?'border-color:'+EN_TEXT[enL]+'44':''}">${pad(i+1)} ${esc(song(x.songId).title||'—')}</button>`;}).join('');
  const cur=document.querySelector('#scJump .cur');if(cur)cur.scrollIntoView({inline:'center',block:'nearest'});
  document.getElementById('scPrev').disabled=scCurrent<=0;
  document.getElementById('scNext').disabled=scCurrent>=items.length-1;
  renderScBody();
}
function renderScBody(){
  const items=as().items;const it=items[scCurrent];const s=song(it.songId);
  const tc=tuneMap(state.songs,items);const tuning=(s.tuning||'').trim();const tColor=tuning&&tc[tuning]?tc[tuning]:'';
  const scIdx=state.prefs.scaleIdx||1;const sc=SCALES[scIdx];
  const enLv=s.energyLevel||0;
  // song header (always shown)
  const header=`<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:8px">
    <div class="sc-num" style="--s:${sc}">${pad(scCurrent+1)}${tColor?`<div class="sc-num-bar" style="background:${tColor}"></div>`:''}</div>
    <div><div class="sc-title" style="--s:${sc}">${esc(s.title)}</div>
      <div class="sc-meta-row" style="--s:${sc}">${s.bpm?`<span>♩ <b>${s.bpm} BPM</b></span>`:''}${enLv?`<span style="color:${EN_TEXT[enLv]}">${EN_LABELS[enLv]}</span>`:''}
      </div>${it.rappel?`<div class="sc-rappel" style="--s:${sc}">🔁 RAPPEL</div>`:''}</div>
  </div>`;
  let content='';
  if(scView==='cues'){
    const cues=CUES.map(c=>{const ls=splitN(it[c.k]);if(!ls.length)return'';return`<div class="sc-cue ${c.cls}" style="--s:${sc}"><div class="sc-chip">${c.ic}</div><div><div class="sc-clbl">${c.l}</div><div class="sc-ctxt">${ls.map(l=>`<div>${esc(l)}</div>`).join('')}</div></div></div>`;}).join('');
    const motto=scCurrent===items.length-1&&as().motto?`<div style="margin-top:12px;text-align:center;font-weight:900;text-transform:uppercase;letter-spacing:.06em;font-size:calc(12px*${sc});color:var(--G);border:1px dashed var(--Gd);border-radius:11px;padding:9px 12px">${esc(as().motto)}</div>`:'';
    content=`<div class="sc-cues" style="gap:8px;display:flex;flex-direction:column">${cues||`<div style="text-align:center;color:var(--mut);font-weight:800;padding:14px 0">Pas de note — <b style="color:var(--G)">lance !</b></div>`}</div>${motto}`;
  } else if(scView==='lyrics'){
    const lyrics=s.lyrics||'';
    content=`<div class="sc-lyrics" style="--s:${sc}">${lyrics?esc(lyrics):`<span style="color:var(--mut2)">Pas de paroles pour ce morceau.<br>Ajoute-les dans la bibliothèque (onglet 📚 Biblio → ✏️).</span>`}</div>
    <div class="sc-lyrics-ctrl">
      <button id="sc-autoscroll-btn" onclick="toggleAutoScroll()">▶ Défilement auto</button>
      <button onclick="changeScrollSpeed(-1)" style="font-size:12px">Lent</button>
      <span id="sc-spd-lbl" class="sc-spd">100%</span>
      <button onclick="changeScrollSpeed(1)" style="font-size:12px">Rapide</button>
      <button onclick="document.getElementById('scBody').scrollTop=0" style="font-size:12px">⬆ Haut</button>
    </div>`;
  } else {
    const musTabs=MUS_TABS.map(m=>`<button class="mus-tab${scMusTab===m.k?' on':''}" onclick="scMusTab='${m.k}';renderScBody()">${m.ic} ${m.l}</button>`).join('');
    const curMus=MUS_TABS.find(m=>m.k===scMusTab)||MUS_TABS[0];
    const txt=s[curMus.k]||'';
    content=`<div class="mus-tabs">${musTabs}</div><div class="mus-content" style="--s:${sc}">${txt?esc(txt):`<span style="color:var(--mut2)">Pas de note pour ${curMus.l}.<br>Ajoute-les dans la bibliothèque (onglet 📚 → ✏️).</span>`}</div>`;
  }
  document.getElementById('scBody').innerHTML=`<div class="sc-card" style="--s:${sc}"><div class="sc-tap-l" onclick="scStep(-1)"></div><div class="sc-tap-r" onclick="scStep(1)"></div><div class="sc-edge-l">◀</div><div class="sc-edge-r">▶</div>${header}<div>${content}</div></div>`;
}
// swipe
(()=>{let x0=null,y0=null;document.addEventListener('touchstart',e=>{const c=document.getElementById('scBody');if(c&&c.contains(e.target)){x0=e.touches[0].clientX;y0=e.touches[0].clientY;}},{passive:true});document.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy))scStep(dx<0?1:-1);x0=y0=null;},{passive:true});})();

/* ═══════════ PRINT ═══════════ */
const PAGE=17;
function buildSheets(){
  const items=as().items;const tc=tuneMap(state.songs,items);
  const pages=Math.max(1,Math.ceil(items.length/PAGE));let html='';
  for(let p=0;p<pages;p++){
    const chunk=items.slice(p*PAGE,(p+1)*PAGE);const off=p*PAGE;
    const lbl=pages>1?`p.${p+1}/${pages}`:'';const rIdx=chunk.findIndex(it=>it.rappel);
    const shRow=(it,ci)=>{
      const s=song(it.songId);const t=(s.tuning||'').trim();const tC=t&&tc[t]?tc[t]:'';
      const prevTune=ci>0?(song(chunk[ci-1].songId).tuning||'').trim():'';const isChg=t&&prevTune&&t!==prevTune;
      const pub=firstLine(it.public);const enc=firstLine(it.enchainement);const par=firstLine(it.parole);const vig=firstLine(it.vigilance);
      return`<div class="sh-row">
        <div class="sh-nb"><div class="sh-nn">${pad(off+ci+1)}</div>${tC?`<div class="sh-td" style="background:${tC}"></div>`:''} ${isChg?`<div class="sh-tc-chg">↻${esc(t)}</div>`:''}</div>
        <div class="sh-main">
          <div class="sh-title-row"><div class="sh-title">${esc(s.title)}${it.rappel?' 🔁':''}</div>${s.bpm?`<div class="sh-bpm">♩${esc(s.bpm)}</div>`:''}</div>
          ${pub?`<div class="sh-pub">${esc(pub)}</div>`:''}
          ${vig?`<div class="sh-vig">⚠️ ${esc(vig)}</div>`:''}
        </div>
        <div class="sh-side">
          ${enc?`<div class="sh-enc">${esc(enc)}</div>`:''}
          ${par?`<div class="sh-par">${esc(par)}</div>`:''}
        </div>
      </div>`;
    };
    const rows=chunk.map((it,ci)=>(ci===rIdx&&rIdx>0?`<div class="sh-row rsp"><div class="rc"><hr>RAPPEL<hr></div></div>`:'')+shRow(it,ci)).join('');
    const d=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    const motto=as().motto||'';
    html+=`<div class="sheet">
      <div class="sh-hd"><div class="sh-brand">GREEN M<img src="${LOGO}" alt="">USE</div><div class="sh-info">${lbl?`<div>Page ${p+1}/${pages}</div>`:''}FEUILLE DE SCÈNE<br><b>${esc(as().name)}</b></div></div>
      <div class="sh-rows">${rows}</div>
      <div class="sh-foot">${motto?`<div class="sh-motto">${esc(motto)}</div>`:'<div></div>'}<div class="sh-by sh-legend">🎤 Public · ➡️ Enchaîn. · 💬 Après · ⚠️ Vigilance</div><div class="sh-by">@ByGinette</div></div>
    </div>`;
  }
  return html;
}
function openPrint(){
  let html;
  try{ html=buildSheets(); }catch(err){ alert('Erreur feuille : '+err.message); return; }
  document.getElementById('sheets-area').innerHTML=html;
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  const sheets=tmp.querySelectorAll('.sheet');
  let prvHtml=''; sheets.forEach(function(sh){ prvHtml+='<div class="prv-box"><div class="sheet">'+sh.innerHTML+'</div></div>'; });
  const n=sheets.length;
  const body=document.getElementById('printBody');
  body.innerHTML='<p style="font-size:13px;color:var(--mut);margin:0 0 8px">'+as().items.length+' morceaux · '+totalDur(as().items)+' · '+n+' feuille'+(n>1?'s':'')+' A4</p><p class="hint">Sur iPhone : <b>Imprimer</b> → écarte deux doigts → <b>Enregistrer en PDF</b></p><div class="prv-wrap" id="prvWrap">'+prvHtml+'</div>';
  document.getElementById('printOverlay').hidden=false;
  function fitPrv(){ var avail=document.getElementById('printBody').clientWidth-20; if(avail<10)return; var shW=210*96/25.4,shH=297*96/25.4,scale=Math.min(1,avail/shW); document.querySelectorAll('#prvWrap .prv-box').forEach(function(box){ var sh=box.querySelector('.sheet'); if(sh){ sh.style.transform='scale('+scale+')'; sh.style.transformOrigin='top left'; box.style.height=(shH*scale)+'px'; box.style.overflow='hidden'; } }); }
  setTimeout(fitPrv,150); setTimeout(fitPrv,500);
}
function closePrint(){document.getElementById('printOverlay').hidden=true;}

/* ── EXPORT/IMPORT ── */
async function exportJSON(){
  if(!state.prefs)state.prefs={};state.prefs.lastExport=new Date().toISOString();persist();
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const file=new File([blob],'green_mouse_studio.json',{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file]});return;}catch(e){}}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='green_mouse_studio.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.songs&&d.sets){state=d;ensure();persist();boot();alert('✅ Données importées !');}else throw 0;}catch(err){alert('❌ Fichier illisible.');}};r.readAsText(f);e.target.value='';}

/* ── BOOT ── */
function boot(){document.querySelectorAll('.logo,#logoImg').forEach(el=>el.src=LOGO);const lk=document.createElement('link');lk.rel='apple-touch-icon';lk.href=LOGO;document.head.appendChild(lk);load();renderSet();renderBiblio();renderJournal();}
boot();
