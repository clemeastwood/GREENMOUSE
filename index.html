function autoLight(s,it={}){let e=+(s.energyLevel||3),m=e<=1?'Noir/bleu très doux, presque immobile':e===2?'Bleu + ambre doux, mouvement lent':e===3?'Blanc chaud + vert discret, vivant mais sobre':e===4?'Ambre / rouge / vert, mouvements modérés':'Rouge / vert / blanc fort, impacts sur breaks';return {mood:first(it.lightMood)||m,top:first(it.lightTop)||first(it.depart)||'Suivre départ groupe',fx:first(it.lightFx)||'',source:first(it.lightMood)||first(it.lightTop)||first(it.lightFx)?'manuel':'auto énergie'}}
function eVal(it){let s=song(it.songId);return Math.max(0,Math.min(5,+(s.energyLevel||0)))}
function analyseData(){let set=as(),items=set.items,alerts=[],n=items.length,energies=items.map(eVal),dur=items.reduce((a,it)=>a+parseSec(song(it.songId).duree),0),avg=n?energies.reduce((a,b)=>a+b,0)/n:0;let missingDur=items.filter(it=>!parseSec(song(it.songId).duree)).length,missingEnergy=items.filter(it=>!song(it.songId).energyLevel).length;if(!n)alerts.push(['crit','Set vide','Aucune analyse possible tant que le set est vide.','Colle une set-list dans le cockpit ou ajoute des morceaux depuis la bibliothèque.']);if(n>17)alerts.push(['info','Plus de 17 titres','La feuille A4 passe en mode compact dynamique pour garder tout sur une page.','C’est volontaire : titres prioritaires, cues réduits.']);if(missingDur)alerts.push(['warn','Durées manquantes',`${missingDur} titre(s) sans durée : la durée totale et le roadbook seront moins fiables.`,'Ajoute juste 3:20, 4:10, etc. Pas besoin de remplir le reste.']);if(missingEnergy)alerts.push(['warn','Énergies manquantes',`${missingEnergy} titre(s) sans niveau d’énergie. La courbe et la lumière automatique seront approximatives.`,'Mets seulement une note 1 à 5 par morceau. C’est le champ le plus rentable.']);if(n&&energies[0]&&energies[0]<4)alerts.push(['warn','Ouverture pas très frontale',`Le premier titre est à ${energies[0]}/5. Ça peut marcher, mais ce n’est pas une claque immédiate.`,'Si tu veux capter un bar vite, ouvre plutôt à 4 ou 5.']);if(n&&energies[n-1]&&energies[n-1]<4)alerts.push(['warn','Final pas assez haut',`Le dernier titre est à ${energies[n-1]}/5. Le public peut sortir sans dernier impact net.`,'Garde un final fédérateur, lourd ou chantable.']);for(let i=0;i<n-1;i++){let d=energies[i+1]-energies[i];if(Math.abs(d)>=3)alerts.push(['warn','Rupture brutale',`${song(items[i].songId).title} → ${song(items[i+1].songId).title} : saut de ${energies[i]}/5 à ${energies[i+1]}/5.`,'Prévois une phrase, un silence assumé ou un enchaînement très clair.']);}
for(let i=0;i<n-2;i++){let tri=energies.slice(i,i+3);if(tri.every(e=>e>=4))alerts.push(['info','Bloc très intense',`${song(items[i].songId).title}, ${song(items[i+1].songId).title}, ${song(items[i+2].songId).title} : trois titres forts d’affilée.`,'Très bien pour envoyer, mais place ensuite une respiration ou un moment public.']);if(tri.every(e=>e<=2&&e>0))alerts.push(['warn','Tunnel bas',`${song(items[i].songId).title}, ${song(items[i+1].songId).title}, ${song(items[i+2].songId).title} : trois titres bas d’affilée.`,'À surveiller si le public est debout ou bruyant.']);}
let tuneChanges=items.reduce((a,it,i)=>i&&song(items[i-1].songId).tuning&&song(it.songId).tuning&&song(items[i-1].songId).tuning!==song(it.songId).tuning?a+1:a,0);if(tuneChanges>=4)alerts.push(['warn','Beaucoup de changements d’accordage',`${tuneChanges} changement(s) détecté(s). Risque de temps mort sur scène.`,'Regroupe les titres par accordage ou transforme les changements en vraies interactions public.']);let noLight=items.filter(it=>!first(it.lightMood)&&!first(it.lightTop)&&!first(it.lightFx)).length;if(n&&noLight/n>.65)alerts.push(['info','Lumière surtout automatique',`${noLight} titre(s) sans consigne lumière manuelle. Le conducteur restera exploitable, mais générique.`,'Ajoute seulement 2-3 mots sur les moments clés : “flash refrain”, “noir fin”, “rouge lourd”.']);if(dur>75*60)alerts.push(['warn','Set long',`Durée estimée : ${fmt(dur)}. C’est probablement trop long pour un plateau bar/co-plateau.`,'Prépare une version 35, 45 et 60 minutes.']);let score=100-alerts.reduce((a,x)=>a+(x[0]==='crit'?30:x[0]==='warn'?12:5),0);score=Math.max(20,Math.min(100,score));return {set,items,energies,alerts,avg,dur,missingDur,score,tuneChanges}}
function renderAnalyse(){let d=analyseData(),items=d.items;document.getElementById('v-analyse').innerHTML=`<div class="hero"><h1>Analyse<br>du set</h1><p>Cette partie doit faire gagner du temps : courbe d’énergie, alertes, documents à fiabiliser, puis prompt prêt à m’envoyer pour une analyse plus fine.</p><div class="actions"><button class="btn g" onclick="copyAIPrompt()">🤖 Copier prompt IA</button><button class="btn" onclick="previewAIPrompt()">Voir le prompt</button><button class="btn ghost" onclick="show('set')">Corriger le set</button></div></div><div class="analyseGrid"><div class="card"><div class="ch"><h2>Courbe énergie</h2><span class="miniTag ${d.avg>=4?'r':d.avg>=3?'y':'g'}">moy. ${d.avg?d.avg.toFixed(1):'—'}/5</span></div><div class="cb">${energyCurveHTML(items,d.energies)}<div class="curveLegend"><span class="miniTag g">1-2 respiration</span><span class="miniTag y">3 tension</span><span class="miniTag r">4-5 impact</span></div></div></div><div class="card"><div class="ch"><h2>Score scène</h2><span class="miniTag">${items.length} titres · ${setDur(items)||'durée ?'}</span></div><div class="cb"><div class="scoreDial"><div class="scoreNum">${d.score}</div><div class="scoreTxt">Score pratique, pas jugement artistique. Il baisse quand l’outil détecte des durées manquantes, ruptures non préparées, final faible, trop de changements d’accordage ou consignes lumière trop vides.</div></div><div style="margin-top:12px">${sourceAuditHTML()}</div></div></div><div class="card wide"><div class="ch"><h2>Alertes utiles</h2><span class="miniTag ${d.alerts.some(a=>a[0]==='crit')?'r':d.alerts.some(a=>a[0]==='warn')?'y':'g'}">${d.alerts.length} point(s)</span></div><div class="cb">${d.alerts.length?d.alerts.map(alertHTML).join(''):'<div class="empty">Rien de bloquant. Le set est exploitable.</div>'}</div></div><div class="card wide"><div class="ch"><h2>Prompt IA prêt à envoyer</h2><button class="btn sm g" onclick="copyAIPrompt()">Copier</button></div><div class="cb"><p class="hint">Tu l’envoies tel quel dans ChatGPT. Il contient les données du set, les manques et les consignes d’analyse.</p><textarea class="promptBox" readonly id="aiPromptBox">${esc(buildAIPrompt())}</textarea></div></div></div>`}
function energyCurveHTML(items,energies){if(!items.length)return'<div class="empty">Aucun set à analyser.</div>';let w=760,h=250,p=36,max=5,min=1,step=items.length>1?(w-2*p)/(items.length-1):0;let pts=items.map((it,i)=>{let e=energies[i]||3,x=p+i*step,y=h-p-((e-min)/(max-min))*(h-2*p);return [x,y,e,it]});let poly=pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');let grid=[1,2,3,4,5].map(e=>{let y=h-p-((e-min)/(max-min))*(h-2*p);return `<line x1="${p}" x2="${w-p}" y1="${y}" y2="${y}" stroke="#2d4250" stroke-width="1"/><text x="8" y="${y+4}" fill="#8ea4ae" font-size="12" font-weight="800">${e}</text>`}).join('');let dots=pts.map((pt,i)=>{let e=pt[2],fill=e>=4?'#ff5555':e===3?'#ffb02e':'#32b52f';return `<g><circle cx="${pt[0]}" cy="${pt[1]}" r="8" fill="${fill}"/><text x="${pt[0]}" y="${h-8}" fill="#8ea4ae" font-size="10" font-weight="800" text-anchor="middle">${i+1}</text><title>${esc(song(pt[3].songId).title)} · énergie ${e}/5</title></g>`}).join('');return `<div class="curveBox"><svg class="curveSvg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Courbe d'énergie du set">${grid}<polyline points="${poly}" fill="none" stroke="#32b52f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg></div>`}
function alertHTML(a){let ic=a[0]==='crit'?'⛔':a[0]==='warn'?'⚠️':'ℹ️';return `<div class="alertCard ${a[0]}"><div class="alertIcon">${ic}</div><div><div class="alertTitle">${esc(a[1])}</div><div class="alertTxt">${esc(a[2])}</div><div class="alertFix">→ ${esc(a[3])}</div></div></div>`}
function sourceAuditHTML(){let items=as().items,n=items.length||1,light=items.filter(it=>first(it.lightMood)||first(it.lightTop)||first(it.lightFx)).length,cues=items.filter(it=>first(it.depart)||first(it.enchainement)||first(it.vigilance)||first(it.public)).length,dur=items.filter(it=>parseSec(song(it.songId).duree)).length,en=items.filter(it=>song(it.songId).energyLevel).length;return `<div class="sourceRows"><div class="sourceRow"><b>Énergie</b><span>${en}/${n} titres — pilote courbe + lumière auto.</span></div><div class="sourceRow"><b>Durées</b><span>${dur}/${n} titres — pilote durée totale + roadbook.</span></div><div class="sourceRow"><b>Cues scène</b><span>${cues}/${n} titres — pilote set papier + mode scène.</span></div><div class="sourceRow"><b>Lumière</b><span>${light}/${n} titres manuels — sinon auto selon énergie.</span></div></div>`}
function buildAIPrompt(){let d=analyseData(),set=d.set,lines=d.items.map((it,i)=>{let s=song(it.songId),auto=autoLight(s,it);return `${pad(i+1)}. ${s.title}\n- durée: ${s.duree||'?'} | bpm: ${s.bpm||'?'} | accordage: ${s.tuning||'?'} | énergie: ${s.energyLevel||'?'} /5\n- départ: ${it.depart||'?'}\n- public: ${it.public||'?'}\n- technique/vigilance: ${it.technique||'?'} / ${it.vigilance||'?'}\n- enchaînement/après: ${it.enchainement||'?'} / ${it.parole||'?'}\n- lumière: ${first(it.lightMood)||auto.mood} | top: ${first(it.lightTop)||auto.top} | fx: ${first(it.lightFx)||auto.fx||'?'}\n- notes morceau: ${s.notes||'?'}`}).join('\n\n');let al=d.alerts.map(a=>`- ${a[1]} : ${a[2]} / piste: ${a[3]}`).join('\n')||'- Aucune alerte majeure.';return `Tu es mon copilote scène pour Green Mouse, trio rock indé français. Analyse cette set-list comme un directeur artistique live, pas comme un tableur.\n\nObjectifs :\n1. juger l’arc d’énergie et la dramaturgie du set ;\n2. repérer les tunnels, ruptures, faiblesses d’ouverture ou de final ;\n3. proposer une version optimisée sans trahir l’intention ;\n4. proposer les interactions public utiles ;\n5. améliorer le conducteur lumière morceau par morceau ;\n6. signaler les données manquantes vraiment importantes, pas tout ce qui manque.\n\nSet : ${set.name}\nDurée estimée : ${setDur(set.items)||'?'}\nNombre de titres : ${set.items.length}\n\nAlertes déjà détectées par l’outil :\n${al}\n\nDonnées morceau par morceau :\n${lines}\n\nRéponds en français, avec un avis franc. Donne d’abord le diagnostic global, puis une proposition de set optimisé, puis les corrections concrètes à saisir dans l’outil.`}
async function copyAIPrompt(){let txt=buildAIPrompt();try{await navigator.clipboard.writeText(txt);alert('Prompt IA copié. Tu peux me le coller directement.')}catch(e){previewAIPrompt()}}
function previewAIPrompt(){openModal('Prompt IA',`<p class="hint">Copie ce texte et envoie-le moi pour une analyse longue et plus artistique.</p><textarea class="promptBox" readonly>${esc(buildAIPrompt())}</textarea>`,`<button class="btn ghost" onclick="closeModal()">Fermer</button><button class="btn g" onclick="copyAIPrompt()">Copier</button>`)}

function renderDocs(){let b=state.band,items=as().items,manualLight=items.filter(it=>first(it.lightMood)||first(it.lightTop)||first(it.lightFx)).length;document.getElementById('v-docs').innerHTML=`<div class="hero"><h1>Documents<br>automatiques</h1><p>Ici tu peux générer, mais surtout corriger les sources. La lumière et la fiche tech ne sont plus bloquées dans le document final : tu as des boutons d’édition dédiés.</p></div><div class="docgrid"><div class="doctile"><h3>🖨 Set-list scène</h3><p>Une seule feuille A4. À partir d’environ 15 titres, elle passe en 2 colonnes ; au-delà, elle peut passer en 3 colonnes.</p><div class="toolRow"><button class="btn g" onclick="previewDoc('set')">Générer</button></div></div><div class="doctile"><h3>💡 Conducteur lumière</h3><p>${manualLight}/${items.length||0} titre(s) avec consigne manuelle. Le reste utilise l’énergie du morceau.</p><div class="toolRow"><button class="btn g" onclick="openLightEditor()">Modifier les lumières</button><button class="btn" onclick="previewDoc('light')">Générer</button></div></div><div class="doctile"><h3>🎛 Fiche technique</h3><p>Contacts, patch, plan de scène, retours, backline et notes techniques modifiables.</p><div class="toolRow"><button class="btn g" onclick="openTechEditor()">Modifier la fiche tech</button><button class="btn" onclick="previewDoc('tech')">Générer</button></div></div><div class="doctile"><h3>📍 Roadbook</h3><p>Infos du prochain live + set prévu + notes.</p><div class="toolRow"><button class="btn g" onclick="previewDoc('road')">Générer</button></div></div></div><div class="explain"><h3>Logique de remplissage</h3><ul><li><b>Set-list papier</b> : ordre du set, durée, accordage, départ, vigilance, enchaînement. La priorité est maintenant le titre lisible.</li><li><b>Lumière</b> : bouton “Modifier les lumières” pour corriger tout le set en une seule page ; sinon génération auto d’après l’énergie.</li><li><b>Fiche tech</b> : bouton “Modifier la fiche tech” pour changer le patch, les retours, le plan de scène et les notes.</li><li><b>Roadbook</b> : agenda live + set associé + notes libres.</li></ul></div><div class="card" style="margin-top:12px"><div class="ch"><h2>Résumé fiche tech actuel</h2><button class="btn sm g" onclick="openTechEditor()">Modifier</button></div><div class="cb"><div class="sourceRows"><div class="sourceRow"><b>Contact</b><span>${esc(b.contact||'—')}</span></div><div class="sourceRow"><b>Style</b><span>${esc(b.style||'—')}</span></div><div class="sourceRow"><b>Retours</b><span>${esc(b.monitoring||b.stageNote||'—')}</span></div><div class="sourceRow"><b>Patch</b><span>${esc((b.patchList||'').split('\n').filter(Boolean).length||'Patch par défaut')} ligne(s)</span></div></div></div></div>`}
function val(id){let el=document.getElementById(id);return el?el.value:''}
function saveBand(){state.band={...state.band,contact:val('bcontact'),phone:val('bphone'),origin:val('borigin'),style:val('bstyle'),members:val('bmembers'),techContact:val('btech'),stageNote:val('bstage'),lightNote:val('blight'),stagePlot:val('bstageplot'),patchList:val('bpatch'),backline:val('bbackline'),monitoring:val('bmonitoring'),powerNote:val('bpower'),techNotes:val('btechnotes')};save();renderDocs();alert('Fiche technique enregistrée.')}
function openLightEditor(){let set=as(),items=set.items,b=state.band;if(!items.length){alert('Set vide');return}let rows=items.map((it,i)=>{let s=song(it.songId),a=autoLight(s,it);return `<div class="lightLine"><h4>${pad(i+1)} · ${esc(s.title)}</h4><div class="tiny">Auto si vide : ${esc(a.mood)} / ${esc(a.top)} / ${esc(a.fx||'—')}</div><div class="row2"><div><label class="lab">Ambiance / couleur</label><input id="lm-${it.id}" value="${esc(it.lightMood||'')}" placeholder="ex : vert profond + blanc refrain"></div><div><label class="lab">Top lumière</label><input id="lt-${it.id}" value="${esc(it.lightTop||'')}" placeholder="ex : noir départ, ouverture refrain"></div></div><label class="lab">Effet / blackout / moment spécial</label><input id="lf-${it.id}" value="${esc(it.lightFx||'')}" placeholder="ex : strobe fin, blackout sec, douche blanche solo"></div>`}).join('');openModal('Modifier les lumières',`<div class="editHelp">Remplis seulement les titres importants. Les champs vides restent en automatique. Le conducteur indiquera si chaque ligne vient du manuel ou de l’énergie.</div><label class="lab">Intention lumière générale</label><textarea id="globalLight">${esc(b.lightNote||'')}</textarea><div class="lightEditor" style="margin-top:12px">${rows}</div>`,`<button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn g" onclick="saveLightEditor()">Sauver lumières</button>`)}
function saveLightEditor(){as().items.forEach(it=>{it.lightMood=val('lm-'+it.id);it.lightTop=val('lt-'+it.id);it.lightFx=val('lf-'+it.id)});state.band.lightNote=val('globalLight');save();closeModal();render();alert('Lumières enregistrées.')}
function openTechEditor(){let b=state.band;openModal('Modifier la fiche technique',`<div class="editHelp">Cette partie pilote directement la fiche technique PDF/impression. Tu peux garder le patch par défaut ou le remplacer par tes lignes.</div><div class="row2"><div><label class="lab">Contact</label><input id="bcontact" value="${esc(b.contact||'')}"></div><div><label class="lab">Téléphone</label><input id="bphone" value="${esc(b.phone||'')}"></div></div><div class="row2"><div><label class="lab">Origine</label><input id="borigin" value="${esc(b.origin||'')}"></div><div><label class="lab">Style</label><input id="bstyle" value="${esc(b.style||'')}"></div></div><label class="lab">Membres</label><textarea id="bmembers">${esc(b.members||'')}</textarea><label class="lab">Contact technique</label><input id="btech" value="${esc(b.techContact||'')}"><label class="lab">Plan de scène / implantation</label><textarea id="bstageplot">${esc(b.stagePlot||'')}</textarea><label class="lab">Patch — 1 ligne par entrée</label><textarea id="bpatch" class="monoArea" placeholder="1 | Kick | Micro kick | Note">${esc(b.patchList||'')}</textarea><div class="patchHint">Format conseillé : <b>Ch | Source | Micro/DI | Note</b>. Exemple : <b>8 | Chant lead | SM58 | Clément</b>.</div><label class="lab">Backline</label><textarea id="bbackline">${esc(b.backline||'')}</textarea><label class="lab">Retours / in-ear</label><textarea id="bmonitoring">${esc(b.monitoring||b.stageNote||'')}</textarea><label class="lab">Alimentation électrique</label><textarea id="bpower">${esc(b.powerNote||'')}</textarea><label class="lab">Notes techniques générales</label><textarea id="btechnotes">${esc(b.techNotes||'')}</textarea><label class="lab">Note lumière générale</label><textarea id="blight">${esc(b.lightNote||'')}</textarea><input id="bstage" value="${esc(b.stageNote||'')}" hidden>`,`<button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn g" onclick="saveBand();closeModal()">Sauver fiche tech</button>`)}
function patchRows(){let raw=(state.band.patchList||'').trim();let fallback=demo().band.patchList;if(!raw)raw=fallback;return raw.split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{let p=line.split('|').map(x=>x.trim());return {ch:p[0]||'',src:p[1]||'',mic:p[2]||'',note:p.slice(3).join(' | ')||''}})}
function renderSceneLauncher(){document.getElementById('v-scene').innerHTML=`<div class="hero"><h1>Mode<br>scène</h1><p>Pour le jour où tu veux tenter autre chose que le papier : gros titres, cues, paroles, navigation au doigt.</p><div class="actions"><button class="btn g" onclick="openScene()">Lancer</button><button class="btn" onclick="previewDoc('set')">Je garde le papier</button></div></div><div class="card"><div class="ch"><h2>Set chargé</h2></div><div class="cb">${arcHTML(as().items)}</div></div>`}
let sceneIndex=0,sceneMode='cues';function openScene(){if(!as().items.length){alert('Set vide');return}sceneIndex=0;sceneMode='cues';document.getElementById('scene').hidden=false;renderSceneBody()}function closeScene(){document.getElementById('scene').hidden=true}function sceneStep(d){sceneIndex=Math.max(0,Math.min(as().items.length-1,sceneIndex+d));renderSceneBody()}function renderSceneBody(){let it=as().items[sceneIndex],s=song(it.songId);document.getElementById('scCount').textContent=`${pad(sceneIndex+1)}/${pad(as().items.length)}`;let cues=[['Départ',it.depart],['Public',it.public],['Son',it.technique],['Vigilance',it.vigilance],['Enchaînement',it.enchainement],['Après',it.parole]].filter(x=>x[1]);document.getElementById('sceneBody').innerHTML=`<div class="bigNum">${pad(sceneIndex+1)}</div><div class="bigTitle">${esc(s.title)}</div><div class="meta" style="font-size:16px;margin:10px 0 18px">${esc(s.duree||'—')} · ${esc(s.tuning||'acc. ?')} · ${s.energyLevel?energyLabel[s.energyLevel]:''}</div>${sceneMode==='lyrics'?`<div class="lyrics">${esc(s.lyrics||'Pas de paroles dans la fiche.')}</div>`:(cues.length?cues.map(c=>`<div class="sceneCue"><b>${esc(c[0])}</b><br>${esc(c[1])}</div>`).join(''):'<div class="empty">Aucun cue. Joue.</div>')}`}

function buildSetSheet(){let set=as(),items=set.items,tc=tuneMap(items),n=Math.max(items.length,1);let cols=n<=14?1:(n<=30?2:3),rows=Math.ceil(n/cols),multi=cols>1;let title=multi?Math.max(cols===3?17.5:20,Math.min(cols===3?21.5:25.5,31-rows*.65)):(Math.max(13.2,Math.min(23.5,31-n*.55)));let num=multi?Math.max(cols===3?15:18,Math.min(cols===3?20:23,27-rows*.45)):(Math.max(14,Math.min(23,29-n*.45)));let cue=multi?Math.max(5.2,Math.min(6.8,8.2-rows*.12)):(Math.max(6.0,Math.min(8.1,10.0-n*.12)));let rowsHtml=items.map((it,i)=>{let s=song(it.songId),t=s.tuning||'',prev=i?song(items[i-1].songId).tuning:'',chg=t&&prev&&t!==prev;return `<div class="prow"><div class="pnum"><b>${pad(i+1)}</b>${t?`<i class="ptune" style="background:${tc[t]||'#268024'}"></i>`:''}${chg?`<span style="font-size:5pt;color:#a06010;font-weight:900">↻${esc(t)}</span>`:''}</div><div class="pmain"><div class="ptitle">${esc(s.title)}${it.rappel?' 🔁':''}</div>${first(it.public)?`<div class="pcue">🎤 ${esc(first(it.public))}</div>`:''}${first(it.vigilance)?`<div class="pcue pvig">⚠ ${esc(first(it.vigilance))}</div>`:''}</div><div class="pside">${first(it.enchainement)?`<div class="pcue">➡ ${esc(first(it.enchainement))}</div>`:''}${first(it.parole)?`<div class="pcue">💬 ${esc(first(it.parole))}</div>`:''}</div></div>`}).join('');return `<div class="psheet ${multi?'multi ':''}${cols===3?'cols3':''}" style="--cols:${cols};--rows:${rows};--title:${title.toFixed(1)}pt;--num:${num.toFixed(1)}pt;--cue:${cue.toFixed(1)}pt"><div class="phead"><div class="pbrand">GREEN M<img src="${LOGO}">USE</div><div class="pinfo">Feuille de scène — 1 page<b>${esc(set.name)}</b>${items.length} titres · ${setDur(items)||'durée ?'} · ${cols} colonne${cols>1?'s':''}</div></div><div class="prows">${rowsHtml}</div><div class="pfoot"><div class="pmotto">${esc(set.motto||'Jouez fort, prenez du plaisir !')}</div><div class="pby">@ByGinette</div></div></div>`}
function docHead(type,title){return `<div class="dtop"><div class="pbrand">GREEN M<img src="${LOGO}">USE</div><div class="dtype">${esc(type)}<b>${esc(title)}</b>${new Date().toLocaleDateString('fr-FR')}</div></div>`}
function buildLight(){let rows=as().items.map((it,i)=>{let s=song(it.songId),e=s.energyLevel||3,l=autoLight(s,it);return `<tr><td><b>${pad(i+1)} · ${esc(s.title)}</b><br>${esc(s.duree||'')} · énergie ${e}/5 · <small>${l.source}</small></td><td>${esc(l.mood)}</td><td>${esc(l.top)}</td><td>${esc(l.fx||first(it.vigilance)||first(it.public)||'—')}</td><td>${esc(first(it.enchainement)||first(it.parole)||'—')}</td></tr>`}).join('');return `<div class="doc">${docHead('Conducteur lumière',as().name)}<div class="sec"><h3>Intention</h3><div class="note">${esc(state.band.lightNote||'')}</div></div><div class="sec"><h3>Mode de lecture</h3><div class="note">Les lignes marquées “manuel” viennent des champs lumière du set. Les lignes “auto énergie” sont générées à partir de la note d’énergie du morceau. C’est une base exploitable, pas une prison.</div></div><div class="sec"><h3>Morceau par morceau</h3><table class="tbl"><thead><tr><th>Titre</th><th>Ambiance</th><th>Top</th><th>À suivre</th><th>Fin / transition</th></tr></thead><tbody>${rows}</tbody></table></div><div class="dfoot"><span>${esc(state.band.techContact||'')}</span><span>@ByGinette · Green Mouse Studio</span></div></div>`}

function buildTech(){let b=state.band,patch=patchRows().map(r=>`<tr><td>${esc(r.ch)}</td><td>${esc(r.src)}</td><td>${esc(r.mic)}</td><td>${esc(r.note)}</td></tr>`).join('');return `<div class="doc">${docHead('Fiche technique','Green Mouse')}<div class="sec"><h3>Contact / groupe</h3><table class="tbl"><tbody><tr><td><b>Contact</b></td><td>${esc(b.contact||'')}</td><td><b>Tél.</b></td><td>${esc(b.phone||'')}</td></tr><tr><td><b>Origine</b></td><td>${esc(b.origin||'')}</td><td><b>Style</b></td><td>${esc(b.style||'')}</td></tr><tr><td><b>Membres</b></td><td colspan="3">${esc(b.members||'').replace(/\n/g,'<br>')}</td></tr></tbody></table></div><div class="sec"><h3>Plan de scène</h3><div class="note" style="margin-bottom:2mm">${esc(b.stagePlot||'').replace(/\n/g,'<br>')}</div><div class="stage"><div class="box dr">Batterie<br>Vincent</div><div class="box ba">Basse + chœur<br>Nicolas</div><div class="box gu">Guitare ampli<br>Clément</div><div class="box vo">Chant lead<br>Clément</div></div></div><div class="sec"><h3>Patch</h3><table class="tbl"><thead><tr><th>Ch</th><th>Source</th><th>Micro / DI</th><th>Note</th></tr></thead><tbody>${patch}</tbody></table></div><div class="sec"><h3>Backline / retours / alimentation</h3><table class="tbl"><tbody><tr><td><b>Backline</b></td><td>${esc(b.backline||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Retours</b></td><td>${esc(b.monitoring||b.stageNote||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Alim.</b></td><td>${esc(b.powerNote||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Notes</b></td><td>${esc(b.techNotes||'').replace(/\n/g,'<br>')}</td></tr></tbody></table></div><div class="dfoot"><span>${esc(b.techContact||'')}</span><span>@ByGinette · Green Mouse Studio</span></div></div>`}
function buildRoad(id){let a=state.agenda.find(x=>x.id===id)||nextLive()||{},set=state.sets.find(s=>s.id===a.setId)||as();let rows=set.items.map((it,i)=>`<tr><td>${pad(i+1)}</td><td><b>${esc(song(it.songId).title)}</b></td><td>${esc(song(it.songId).duree||'')}</td><td>${esc(song(it.songId).tuning||'')}</td><td>${esc(first(it.vigilance)||first(it.enchainement)||'')}</td></tr>`).join('');return `<div class="doc">${docHead('Roadbook live',a.venue||'Live à confirmer')}<div class="sec"><h3>Infos</h3><table class="tbl"><tbody><tr><td><b>Date</b></td><td>${esc(a.date||'À confirmer')}</td><td><b>Heure scène</b></td><td>${esc(a.stageTime||'À confirmer')}</td></tr><tr><td><b>Lieu</b></td><td>${esc(a.venue||'')}</td><td><b>Ville</b></td><td>${esc(a.city||'')}</td></tr><tr><td><b>Set</b></td><td>${esc(set.name)}</td><td><b>Durée</b></td><td>${setDur(set.items)||'—'}</td></tr></tbody></table></div><div class="sec"><h3>Notes</h3><div class="note">${esc(a.notes||'Parking, balance, contact orga, restauration : à compléter si besoin.')}</div></div><div class="sec"><h3>Set prévu</h3><table class="tbl"><thead><tr><th>#</th><th>Titre</th><th>Durée</th><th>Accordage</th><th>Vigilance</th></tr></thead><tbody>${rows}</tbody></table></div><div class="dfoot"><span>${esc(state.band.contact||'')}</span><span>@ByGinette · Green Mouse Studio</span></div></div>`}
function buildDoc(type,id){return type==='set'?buildSetSheet():type==='light'?buildLight():type==='tech'?buildTech():buildRoad(id)}
function previewDoc(type,id){let html=buildDoc(type,id);document.getElementById('printArea').innerHTML=html;let title={set:'Set-list A4',light:'Conducteur lumière',tech:'Fiche technique',road:'Roadbook'}[type];openModal(title,`<div class="hint" style="margin-bottom:10px">Aperçu. Le bouton Imprimer permet aussi d’enregistrer en PDF sur iPhone.</div><div id="prev" class="preview">${html}</div>`,`<button class="btn ghost" onclick="closeModal()">Fermer</button><button class="btn g" onclick="window.print()">🖨 Imprimer / PDF</button>`);setTimeout(()=>{let box=document.getElementById('prev'),page=box?.firstElementChild;if(page){let scale=Math.min(1,(box.clientWidth-4)/(210*96/25.4));page.style.transform=`scale(${scale})`;box.style.height=(297*96/25.4*scale)+'px';box.style.overflow='hidden'}},50)}
function openModal(t,b,f){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=b;document.getElementById('modalFoot').innerHTML=f;document.getElementById('modal').hidden=false}function closeModal(){document.getElementById('modal').hidden=true}
async function exportJSON(){save();let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),file=new File([blob],'green_mouse_command_center.json',{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file]});return}catch(e){}}let url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='green_mouse_command_center.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!d.songs||!d.sets)throw 0;state=d;ensure();save();render();alert('Données importées.')}catch(_){alert('Fichier JSON illisible.')}};r.readAsText(f);e.target.value=''}

function normalizeStageItem(it){let t=stageCanonicalType(it.type);return {id:it.id||uid(),type:t,label:(it.label||stageTypeLabel(t)).toString(),x:Math.max(0,Math.min(95,+it.x||0)),y:Math.max(0,Math.min(95,+it.y||0)),w:Math.max(4,Math.min(90,+it.w||18)),h:Math.max(4,Math.min(45,+it.h||10))}}
function stageItems(){if(!state.band)state.band={};if(!Array.isArray(state.band.stageItems)||!state.band.stageItems.length){state.band.stageItems=defaultStageItems()}state.band.stageItems=state.band.stageItems.map(normalizeStageItem);return state.band.stageItems}
function stageTypeOptions(v){v=stageCanonicalType(v);return stageTypeList().map(o=>`<option value="${o[0]}" ${o[0]===v?'selected':''}>${o[2]} ${o[1]}</option>`).join('')}
function stageDraft(){if(!window.__gmStageDraft)window.__gmStageDraft=stageItems().map(x=>({...x}));return window.__gmStageDraft}
function renderStageBoxes(items,editable=false){return `<div class="stageGrid"></div>`+items.map((raw,i)=>{let it=normalizeStageItem(raw),type=stageCanonicalType(it.type),title=(it.label||stageTypeLabel(type));return `<div class="${editable?'stageNode':'box'} ${esc(type)}" ${editable?`data-i="${i}" onpointerdown="stageDragStart(event,${i})"`:''} title="${esc(stageTypeLabel(type))}" style="left:${(+it.x).toFixed(1)}%;top:${(+it.y).toFixed(1)}%;width:${(+it.w).toFixed(1)}%;height:${(+it.h).toFixed(1)}%"><span class="stageObjIcon">${stageIcon(type)}</span><span class="stageObjLabel">${esc(title)}</span></div>`}).join('')}
function stageLibraryButtons(){let ids=['backdrop','drums','pad','bassAmp','guitarAmp','guitar','bass','guitarPedal','bassPedal','vocalMic','instMic','monitor','power'];return ids.map(t=>`<button class="stageObjBtn" onclick="addStageItem('${t}')"><span>${stageTypeEmoji(t)}</span>${stageTypeLabel(t)}</button>`).join('')}
function openStageEditor(){window.__gmStageDraft=stageItems().map(x=>({...x}));openModal('Créer / modifier le plan de scène',`<div class="editHelp"><b>Plan de scène visuel.</b> Les objets sont maintenant plus propres à l’impression : pas de cadres parasites, basse à l’horizontale, batterie plus lisible, pad et backdrop 4 m disponibles.</div><div id="stageEditorContent"></div>`,`<button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn g" onclick="saveStagePlan();closeModal()">Sauver le plan</button>`);renderStageEditor()}
function renderStageEditor(){let items=stageDraft();let html=`<div class="stageBtns"><button class="btn sm" onclick="stagePreset('classic')">Preset trio complet</button><button class="btn sm" onclick="stagePreset('compact')">Preset petite scène</button><button class="btn sm red" onclick="clearStageItems()">Vider</button></div><div class="stageLibrary"><div class="stageLibraryTitle">Bibliothèque scène — ajouter un objet</div><div class="stageLibraryGrid">${stageLibraryButtons()}</div></div><div class="stageEdit"><div class="stageCanvas" id="stageCanvas">${renderStageBoxes(items,true)}</div><p class="stageHelp">Astuce : déplace les objets au doigt/souris. X/Y = position en %, L/H = taille. Le bas du plan correspond au public.</p></div><div class="stageRows">${items.map((it,i)=>`<div class="stageLine"><div class="stageLineTop"><textarea id="st_label_${i}" oninput="stageUpdateField(${i},'label',this.value)" placeholder="Nom du bloc">${esc(it.label)}</textarea><select id="st_type_${i}" onchange="stageUpdateField(${i},'type',this.value)">${stageTypeOptions(it.type)}</select><button class="btn sm red" onclick="removeStageItem(${i})">Supprimer</button></div><div class="stageNums"><input type="number" min="0" max="95" value="${it.x}" onchange="stageUpdateField(${i},'x',this.value)" placeholder="X"><input type="number" min="0" max="95" value="${it.y}" onchange="stageUpdateField(${i},'y',this.value)" placeholder="Y"><input type="number" min="4" max="90" value="${it.w}" onchange="stageUpdateField(${i},'w',this.value)" placeholder="Largeur"><input type="number" min="4" max="45" value="${it.h}" onchange="stageUpdateField(${i},'h',this.value)" placeholder="Hauteur"></div></div>`).join('')}</div>`;let el=document.getElementById('stageEditorContent');if(el)el.innerHTML=html}
function stageUpdateField(i,k,v){let items=stageDraft();if(!items[i])return;items[i][k]=(k==='label'||k==='type')?v:+v;items[i]=normalizeStageItem(items[i]);let content=document.getElementById('stageEditorContent');if(content){let canvas=document.getElementById('stageCanvas');if(canvas)canvas.innerHTML=renderStageBoxes(items,true)}}
function addStageItem(type='misc'){type=stageCanonicalType(type);let size={backdrop:[66,8],drums:[28,22],pad:[10,10],bassAmp:[14,12],guitarAmp:[14,12],guitar:[18,13],bass:[18,13],guitarPedal:[17,6],bassPedal:[17,6],vocalMic:[11,20],instMic:[10,18],monitor:[18,8],power:[5,6],misc:[22,10]}[type]||[22,10];stageDraft().push({id:uid(),type,label:stageTypeLabel(type),x:type==='backdrop'?17:35,y:type==='backdrop'?2:55,w:size[0],h:size[1]});renderStageEditor()}
function removeStageItem(i){stageDraft().splice(i,1);renderStageEditor()}
function clearStageItems(){if(confirm('Vider complètement le plan de scène ?')){window.__gmStageDraft=[];renderStageEditor()}}
function stagePreset(kind){window.__gmStageDraft=kind==='compact'?[{id:uid(),type:'backdrop',label:'Backdrop 4 m',x:20,y:1,w:60,h:8},{id:uid(),type:'guitarAmp',label:'Ampli guitare',x:14,y:16,w:13,h:11},{id:uid(),type:'drums',label:'Batterie',x:40,y:16,w:24,h:20},{id:uid(),type:'pad',label:'Pad',x:62,y:16,w:9,h:10},{id:uid(),type:'bassAmp',label:'Ampli basse',x:72,y:16,w:13,h:11},{id:uid(),type:'guitar',label:'Guitare',x:15,y:50,w:17,h:12},{id:uid(),type:'vocalMic',label:'Micro chant',x:22,y:60,w:10,h:18},{id:uid(),type:'bass',label:'Basse',x:68,y:50,w:17,h:12},{id:uid(),type:'vocalMic',label:'Micro chant',x:60,y:60,w:10,h:18},{id:uid(),type:'guitarPedal',label:'Pedalboard',x:23,y:73,w:16,h:6},{id:uid(),type:'bassPedal',label:'Pedalboard',x:60,y:73,w:16,h:6}]:defaultStageItems();renderStageEditor()}
function saveStagePlan(){state.band=state.band||{};state.band.stageItems=stageDraft().map(normalizeStageItem);state.band.stagePlot=state.band.stagePlot||'Plan de scène modifiable dans l’éditeur dédié. Bas du plan = public.';save();renderDocs();alert('Plan de scène enregistré.')}
let __stageDrag=null;
function stageDragStart(ev,i){let canvas=document.getElementById('stageCanvas');if(!canvas)return;ev.preventDefault();let rect=canvas.getBoundingClientRect(),it=stageDraft()[i];__stageDrag={i,rect,dx:(ev.clientX-rect.left)/rect.width*100-it.x,dy:(ev.clientY-rect.top)/rect.height*100-it.y};try{ev.target.setPointerCapture(ev.pointerId)}catch(e){};window.addEventListener('pointermove',stageDragMove);window.addEventListener('pointerup',stageDragEnd,{once:true})}
function stageDragMove(ev){if(!__stageDrag)return;let d=__stageDrag,items=stageDraft(),it=items[d.i];if(!it)return;let nx=(ev.clientX-d.rect.left)/d.rect.width*100-d.dx,ny=(ev.clientY-d.rect.top)/d.rect.height*100-d.dy;it.x=Math.max(0,Math.min(100-it.w,nx));it.y=Math.max(0,Math.min(100-it.h,ny));let node=document.querySelector(`.stageNode[data-i="${d.i}"]`);if(node){node.style.left=it.x.toFixed(1)+'%';node.style.top=it.y.toFixed(1)+'%'}let xi=document.querySelector(`#st_label_${d.i}`)?.closest('.stageLine')?.querySelectorAll('.stageNums input');if(xi&&xi.length>=2){xi[0].value=it.x.toFixed(1);xi[1].value=it.y.toFixed(1)}}
function stageDragEnd(){window.removeEventListener('pointermove',stageDragMove);__stageDrag=null}
function saveBand(){state.band={...state.band,contact:val('bcontact'),phone:val('bphone'),origin:val('borigin'),style:val('bstyle'),members:val('bmembers'),techContact:val('btech'),stageNote:val('bstage'),lightNote:val('blight'),stagePlot:val('bstageplot'),patchList:val('bpatch'),backline:val('bbackline'),monitoring:val('bmonitoring'),powerNote:val('bpower'),techNotes:val('btechnotes'),stageItems:stageItems()};save();renderDocs();alert('Fiche technique enregistrée.')}
function openTechEditor(){let b=state.band,items=stageItems();openModal('Modifier la fiche technique',`<div class="editHelp">Cette partie pilote directement la fiche technique PDF/impression. Le plan de scène n’est plus supposé : il se construit dans un éditeur dédié.</div><div class="row2"><div><label class="lab">Contact</label><input id="bcontact" value="${esc(b.contact||'')}"></div><div><label class="lab">Téléphone</label><input id="bphone" value="${esc(b.phone||'')}"></div></div><div class="row2"><div><label class="lab">Origine</label><input id="borigin" value="${esc(b.origin||'')}"></div><div><label class="lab">Style</label><input id="bstyle" value="${esc(b.style||'')}"></div></div><label class="lab">Membres</label><textarea id="bmembers">${esc(b.members||'')}</textarea><label class="lab">Contact technique</label><input id="btech" value="${esc(b.techContact||'')}"><label class="lab">Plan de scène / implantation — texte explicatif</label><textarea id="bstageplot">${esc(b.stagePlot||'')}</textarea><div class="stageEdit"><div class="stageCanvas">${renderStageBoxes(items,false)}</div><p class="stageHelp"><span class="stage-mini-count">${items.length}</span> bloc(s) dans le plan actuel. Pour changer les positions, les tailles ou ajouter un musicien/retour/ampli, utilise l’éditeur visuel.</p><button class="btn g" type="button" onclick="saveBand();openStageEditor()">Créer / modifier le plan de scène</button></div><label class="lab">Patch — 1 ligne par entrée</label><textarea id="bpatch" class="monoArea" placeholder="1 | Kick | Micro kick | Note">${esc(b.patchList||'')}</textarea><div class="patchHint">Format conseillé : <b>Ch | Source | Micro/DI | Note</b>. Exemple : <b>8 | Chant lead | SM58 | Clément</b>.</div><label class="lab">Backline</label><textarea id="bbackline">${esc(b.backline||'')}</textarea><label class="lab">Retours / in-ear</label><textarea id="bmonitoring">${esc(b.monitoring||b.stageNote||'')}</textarea><label class="lab">Alimentation électrique</label><textarea id="bpower">${esc(b.powerNote||'')}</textarea><label class="lab">Notes techniques générales</label><textarea id="btechnotes">${esc(b.techNotes||'')}</textarea><label class="lab">Note lumière générale</label><textarea id="blight">${esc(b.lightNote||'')}</textarea><input id="bstage" value="${esc(b.stageNote||'')}" hidden>`,`<button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn g" onclick="saveBand();closeModal()">Sauver fiche tech</button>`)}
function renderDocs(){let b=state.band,items=as().items,manualLight=items.filter(it=>first(it.lightMood)||first(it.lightTop)||first(it.lightFx)).length,st=stageItems().length;document.getElementById('v-docs').innerHTML=`<div class="hero"><h1>Documents<br>automatiques</h1><p>Ici tu peux générer, mais surtout corriger les sources. Le conducteur lumière, la fiche tech et maintenant le plan de scène sont pilotables.</p></div><div class="docgrid"><div class="doctile"><h3>🖨 Set-list scène</h3><p>Une seule feuille A4. À partir d’environ 15 titres, elle passe en 2 colonnes ; au-delà, elle peut passer en 3 colonnes.</p><div class="toolRow"><button class="btn g" onclick="previewDoc('set')">Générer</button></div></div><div class="doctile"><h3>💡 Conducteur lumière</h3><p>${manualLight}/${items.length||0} titre(s) avec consigne manuelle. Le reste utilise l’énergie du morceau.</p><div class="toolRow"><button class="btn g" onclick="openLightEditor()">Modifier les lumières</button><button class="btn" onclick="previewDoc('light')">Générer</button></div></div><div class="doctile"><h3>🎛 Fiche technique</h3><p>Contacts, patch, retours, backline, notes et plan de scène modifiable. Plan actuel : ${st} bloc(s).</p><div class="toolRow"><button class="btn g" onclick="openTechEditor()">Modifier la fiche tech</button><button class="btn" onclick="openStageEditor()">Plan de scène</button><button class="btn" onclick="previewDoc('tech')">Générer</button></div></div><div class="doctile"><h3>📍 Roadbook</h3><p>Infos du prochain live + set prévu + notes.</p><div class="toolRow"><button class="btn g" onclick="previewDoc('road')">Générer</button></div></div></div><div class="explain"><h3>Logique de remplissage</h3><ul><li><b>Set-list papier</b> : ordre du set, durée, accordage, départ, vigilance, enchaînement. Priorité au titre lisible.</li><li><b>Lumière</b> : bouton “Modifier les lumières” pour corriger tout le set ; sinon génération auto d’après l’énergie.</li><li><b>Plan de scène</b> : bouton “Plan de scène” pour déplacer/créer/supprimer les blocs réellement imprimés sur la fiche tech.</li><li><b>Fiche tech</b> : bouton “Modifier la fiche tech” pour changer contacts, patch, retours, backline et notes.</li><li><b>Roadbook</b> : agenda live + set associé + notes libres.</li></ul></div><div class="card" style="margin-top:12px"><div class="ch"><h2>Résumé fiche tech actuel</h2><button class="btn sm g" onclick="openTechEditor()">Modifier</button></div><div class="cb"><div class="sourceRows"><div class="sourceRow"><b>Contact</b><span>${esc(b.contact||'—')}</span></div><div class="sourceRow"><b>Style</b><span>${esc(b.style||'—')}</span></div><div class="sourceRow"><b>Plan</b><span>${st} bloc(s) modifiable(s)</span></div><div class="sourceRow"><b>Retours</b><span>${esc(b.monitoring||b.stageNote||'—')}</span></div><div class="sourceRow"><b>Patch</b><span>${patchRows().length} ligne(s)</span></div></div></div></div>`}
function buildTech(){let b=state.band,patch=patchRows().map(r=>`<tr><td>${esc(r.ch)}</td><td>${esc(r.src)}</td><td>${esc(r.mic)}</td><td>${esc(r.note)}</td></tr>`).join(''),boxes=renderStageBoxes(stageItems(),false);return `<div class="doc">${docHead('Fiche technique','Green Mouse')}<div class="sec"><h3>Contact / groupe</h3><table class="tbl"><tbody><tr><td><b>Contact</b></td><td>${esc(b.contact||'')}</td><td><b>Tél.</b></td><td>${esc(b.phone||'')}</td></tr><tr><td><b>Origine</b></td><td>${esc(b.origin||'')}</td><td><b>Style</b></td><td>${esc(b.style||'')}</td></tr><tr><td><b>Membres</b></td><td colspan="3">${esc(b.members||'').replace(/\n/g,'<br>')}</td></tr></tbody></table></div><div class="sec"><h3>Plan de scène</h3><div class="note" style="margin-bottom:2mm">${esc(b.stagePlot||'Bas du plan = public. Le rectangle du haut peut simuler un backdrop de 4 m.').replace(/\n/g,'<br>')}</div><div class="stage dynamic">${boxes}</div></div><div class="sec"><h3>Patch</h3><table class="tbl"><thead><tr><th>Ch</th><th>Source</th><th>Micro / DI</th><th>Note</th></tr></thead><tbody>${patch}</tbody></table></div><div class="sec"><h3>Backline / retours / alimentation</h3><table class="tbl"><tbody><tr><td><b>Backline</b></td><td>${esc(b.backline||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Retours</b></td><td>${esc(b.monitoring||b.stageNote||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Alim.</b></td><td>${esc(b.powerNote||'').replace(/\n/g,'<br>')}</td></tr><tr><td><b>Notes</b></td><td>${esc(b.techNotes||'').replace(/\n/g,'<br>')}</td></tr></tbody></table></div><div class="dfoot"><span>${esc(b.techContact||'')}</span><span>@ByGinette · Green Mouse Studio</span></div></div>`}

function init(){document.getElementById('logo').src=LOGO;document.getElementById('tabs').innerHTML=tabs.map(([id,ic,l])=>`<button id="tab-${id}" class="tab" onclick="show('${id}')"><span>${ic}</span>${l}</button>`).join('');load();show('cockpit')}init();
</script>
</body></html>
